<!DOCTYPE html>
<!-- Joelboard Fit. © 2026 Joel Soluções LTDA. -->
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Joelboard Fit</title>
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="manifest" href="/manifest.json">
<link rel="stylesheet" href="/joelboard.css">
<meta name="theme-color" content="#0d0f18">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Fit">
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{ --bg:#0d0f18; --surface:#191d2c; --surface2:#232838; --border:#2d3346; --accent:#fb7185; --accent2:#3a2530; --text:#e7eaf3; --muted:#7b85a0; --radius:16px; }
*{ box-sizing:border-box; margin:0; padding:0; }
html,body{ overflow-x:hidden; }
body{ background:var(--bg); color:var(--text); font-family:'Hanken Grotesk',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; min-height:100vh; padding:26px 18px 90px; font-size:14px; line-height:1.5; }
#loading{ max-width:480px; margin:0 auto; }
#app{ display:none; max-width:760px; margin:0 auto; }
.header{ display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:20px; }
.hl{ display:flex; align-items:center; gap:10px; }
.hl img{ width:34px; height:34px; border-radius:9px; }
.hl h1{ font-size:20px; font-weight:800; letter-spacing:-.4px; }
.acct{ font-size:12px; color:var(--muted); display:flex; align-items:center; gap:10px; }
.lnk{ background:none; border:none; color:var(--accent); font-weight:700; font-size:12px; cursor:pointer; font-family:inherit; }
.tabbar{ display:flex; gap:2px; border-bottom:1px solid var(--border); margin-bottom:20px; overflow-x:auto; overflow-y:hidden; touch-action:pan-x; scrollbar-width:none; }
.tabbar::-webkit-scrollbar{ display:none; }
.tabb{ flex:0 0 auto; background:none; border:none; color:var(--muted); font-family:inherit; font-size:14px; font-weight:600; padding:12px 14px; cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px; }
.tabb.on{ color:var(--accent); border-bottom-color:var(--accent); }
.page{ display:none; }
.page.on{ display:block; }
.secbar{ display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:14px; flex-wrap:wrap; }
.sect{ font-size:11px; font-weight:700; letter-spacing:.8px; text-transform:uppercase; color:var(--muted); }
.btn{ background:var(--accent); color:#3a0f17; border:none; border-radius:99px; padding:8px 15px; font-weight:800; font-size:13px; cursor:pointer; font-family:inherit; }
.btn.ghost{ background:var(--surface2); color:var(--text); border:1px solid var(--border); font-weight:700; }
.row{ display:flex; align-items:center; justify-content:space-between; gap:10px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:14px 16px; margin-bottom:8px; cursor:pointer; }
.row:hover{ border-color:var(--accent); }
.rn{ font-size:15px; font-weight:600; }
.rg{ font-size:12px; color:var(--muted); margin-top:1px; }
.empty{ color:var(--muted); text-align:center; padding:40px 16px; font-size:13px; }
.soon{ color:var(--muted); text-align:center; padding:60px 16px; }
.soon .big{ font-size:18px; font-weight:700; color:var(--text); margin-bottom:6px; }
.fab{ position:fixed; bottom:22px; right:18px; width:54px; height:54px; border-radius:50%; background:var(--accent); color:#3a0f17; border:none; font-size:30px; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 6px 22px rgba(251,113,133,0.4); z-index:40; }
.door{ position:fixed; bottom:20px; left:16px; z-index:40; width:42px; height:42px; border-radius:12px; background:var(--surface); border:1px solid var(--border); color:var(--accent); display:flex; align-items:center; justify-content:center; cursor:pointer; box-shadow:0 3px 12px rgba(0,0,0,0.25); }
.overlay{ position:fixed; inset:0; background:rgba(0,0,0,0.65); display:none; align-items:center; justify-content:center; z-index:200; padding:18px; }
.overlay.open{ display:flex; }
.modal{ background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:24px; width:100%; max-width:400px; }
.mh{ display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
.mt{ font-size:17px; font-weight:800; }
.x{ background:none; border:none; color:var(--muted); font-size:18px; cursor:pointer; }
.fg{ margin-bottom:14px; }
.fl{ display:block; font-size:12px; color:var(--muted); margin-bottom:6px; font-weight:600; }
.fi{ width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:11px 13px; color:var(--text); font-size:14px; font-family:inherit; }
.save{ width:100%; background:var(--accent); color:#3a0f17; border:none; border-radius:12px; padding:13px; font-weight:800; font-size:15px; cursor:pointer; font-family:inherit; }
.del{ width:100%; background:none; border:none; color:var(--muted); font-size:13px; text-decoration:underline; cursor:pointer; font-family:inherit; margin-top:12px; }
.toast{ position:fixed; left:50%; bottom:84px; transform:translateX(-50%); background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:10px 16px; border-radius:99px; font-size:13px; opacity:0; transition:opacity .2s; pointer-events:none; z-index:300; white-space:nowrap; }
.toast.show{ opacity:1; }
.foot{ text-align:center; color:var(--muted); font-size:11px; opacity:0.55; margin-top:36px; }
.gate{ max-width:420px; margin:40px auto; text-align:center; }
.gate .gt{ font-size:22px; font-weight:800; letter-spacing:-.5px; }
.gate .gs{ color:var(--muted); font-size:13px; margin:6px 0 24px; }
.exc{ background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:14px; margin-bottom:10px; }
.exh{ display:flex; justify-content:space-between; align-items:center; }
.rmx{ background:none;border:none;color:var(--muted);font-size:11px;cursor:pointer;font-family:inherit; }
.ll{ font-size:12px;color:var(--muted);margin:2px 0 10px; }
.setrow{ display:flex;align-items:center;gap:8px;margin-bottom:7px; }
.setn{ width:18px;color:var(--muted);font-size:12px;font-weight:700;text-align:center; }
.si{ width:74px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px;color:var(--text);font-size:14px;font-family:inherit;text-align:center; }
.xs{ color:var(--muted); }
.un{ font-size:12px;color:var(--muted);width:20px; }
.rm{ background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;margin-left:auto; }
.addset{ background:none;border:1px dashed var(--border);color:var(--accent);border-radius:8px;padding:7px;width:100%;cursor:pointer;font-family:inherit;font-weight:700;font-size:12px;margin-top:4px; }
.prg{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:14px; }
.prc{ background:var(--surface2); border-radius:12px; padding:12px 10px; text-align:center; }
.prl{ font-size:11px; color:var(--muted); }
.prv{ font-size:18px; font-weight:800; color:var(--accent); margin-top:2px; }
.selrow{ display:flex;align-items:center;gap:10px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:6px; }
.dh{ color:var(--muted);cursor:grab;font-size:15px;touch-action:none;user-select:none; }
.selname{ flex:1;font-size:14px;font-weight:600; }
.addrow{ display:flex;align-items:center;justify-content:space-between;gap:8px;padding:10px 12px;border-radius:8px;cursor:pointer;font-size:14px; }
.addrow:active{ background:var(--accent2); }
.addrow.create{ color:var(--accent);font-weight:700; }
.plus{ color:var(--accent);font-weight:800; }
.modal{ max-height:90vh; overflow-y:auto; }
.tagchip{ display:inline-flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border);border-radius:99px;padding:5px 11px;font-size:13px;margin:0 6px 6px 0; }
.tx{ cursor:pointer;color:var(--muted);font-size:11px; }
.tx:active{ color:var(--accent); }
.targrow{ display:flex;align-items:center;flex-wrap:nowrap;gap:4px;margin-top:6px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch; }
.targrow::-webkit-scrollbar{ display:none; }
.ti{ width:40px;flex:0 0 auto;background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:5px;color:var(--text);font-size:13px;font-family:inherit;text-align:center; }
.tl{ font-size:11px;color:var(--muted); }
.todaycard{ background:var(--accent2); border:1px solid var(--accent); border-radius:var(--radius); padding:18px; margin-bottom:22px; }
.todaycard.rest{ background:var(--surface); border-color:var(--border); }
.tdlabel{ font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--accent); }
.todaycard.rest .tdlabel{ color:var(--muted); }
.tdname{ font-size:20px;font-weight:800;margin-top:3px; }
.runtop{ display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:16px; }
.runset.active{ background:var(--accent2);border:1px solid var(--accent);border-radius:10px;padding:6px 8px; }
.runset.done .si{ opacity:0.55; }
.setok{ margin-left:auto;background:var(--accent);color:#3a0f17;border:none;border-radius:8px;padding:7px 14px;font-weight:800;cursor:pointer;font-family:inherit;font-size:14px; }
.runnav{ display:flex;gap:10px;margin-top:14px; }
.runnav .btn{ flex:1; }
.runnav .btn:disabled{ opacity:0.4; }
.restbar{ position:fixed;left:50%;bottom:78px;transform:translateX(-50%);display:flex;align-items:center;gap:12px;background:var(--accent);color:#3a0f17;padding:11px 18px;border-radius:99px;z-index:60;box-shadow:0 6px 22px rgba(251,113,133,0.45);font-weight:800; }
.restbar .rt{ font-size:16px; }
.rbtn{ background:rgba(0,0,0,0.18);border:none;color:#3a0f17;border-radius:99px;padding:5px 11px;font-weight:800;cursor:pointer;font-family:inherit;font-size:12px; }
.pghint{ font-size:12px; font-weight:700; border-radius:9px; padding:7px 11px; margin:9px 0 2px; line-height:1.35; }
.pghint.up{ background:rgba(52,211,153,0.14); color:#34d399; }
.pghint.hold{ background:var(--surface2); color:var(--muted); }
.volwrap{ display:flex; flex-direction:column; gap:13px; }
.volrow .volhd{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:5px; }
.volg{ font-size:13px; font-weight:600; }
.voln{ font-size:13px; font-weight:800; }
.voln .volt{ font-weight:600; color:var(--muted); font-size:11px; }
.voln.in{ color:#34d399; } .voln.under{ color:#fbbf24; } .voln.over{ color:var(--accent); }
.voltrack{ height:7px; background:var(--surface2); border-radius:99px; overflow:hidden; }
.volbar{ height:100%; border-radius:99px; transition:width .5s; }
.volbar.in{ background:#34d399; } .volbar.under{ background:#fbbf24; } .volbar.over{ background:var(--accent); }
.volnudge{ background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:13px 15px; margin-bottom:16px; cursor:pointer; }
.volnudge .vnh{ display:flex; justify-content:space-between; font-size:13px; font-weight:700; margin-bottom:3px; }
.volnudge .vnc{ color:var(--accent); }
.volnudge .vns{ font-size:12px; color:var(--muted); line-height:1.4; }
.volgrow{ display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.volgname{ flex:1; font-size:13px; }
.vmini{ width:62px; text-align:center; }
.vdash{ color:var(--muted); }
.set-tabs{ display:flex; gap:4px; margin-bottom:16px; border-bottom:1px solid var(--border); flex-wrap:nowrap; overflow-x:auto; overflow-y:hidden; touch-action:pan-x; overscroll-behavior-x:contain; scrollbar-width:none; -webkit-overflow-scrolling:touch; }
.set-tabs::-webkit-scrollbar{ display:none; }
.set-tab{ background:none; border:none; border-bottom:2px solid transparent; color:var(--muted); font-size:13px; font-weight:700; padding:8px 12px; cursor:pointer; margin-bottom:-1px; white-space:nowrap; flex:0 0 auto; font-family:inherit; }
.set-tab.active{ color:var(--accent); border-bottom-color:var(--accent); }
.pghint.stall{ background:rgba(251,191,36,0.16); color:#fbbf24; }
.modebadge{ font-size:10px; font-weight:700; background:var(--accent2); color:var(--accent); border-radius:6px; padding:2px 6px; vertical-align:middle; margin-left:4px; }
.ppv{ background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px; margin-bottom:14px; }
.ppvh{ display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
.ppvt{ font-size:14px; font-weight:800; }
.ppvtarget{ font-size:12.5px; color:var(--muted); }
.ppvstat{ font-size:12px; color:var(--muted); margin-top:6px; }
.ppvlad{ display:flex; gap:6px; margin-top:12px; flex-wrap:wrap; }
.ppvstep{ font-size:11px; font-weight:700; color:var(--muted); background:var(--surface2); border:1px solid var(--border); border-radius:99px; padding:5px 10px; }
.ppvstep.on{ color:#3a0f17; background:var(--accent); border-color:var(--accent); }
.ppvstep.done{ color:#34d399; border-color:rgba(52,211,153,0.4); }
.ppvnextlbl{ font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; color:var(--muted); margin:14px 0 5px; }
.ppvnext{ font-size:13.5px; line-height:1.5; }
.ppvnext b{ color:var(--text); }
.bwtag{ font-size:10px;font-weight:700;background:var(--accent2);color:var(--accent);border-radius:6px;padding:2px 7px;vertical-align:middle;margin-left:4px; }
.herocard{ background:linear-gradient(140deg, var(--accent2), var(--surface) 70%); border:1px solid var(--accent); border-radius:18px; padding:20px; margin-bottom:16px; }
.herocard.rest{ background:var(--surface); border-color:var(--border); }
.herolbl{ font-size:11px; font-weight:800; color:var(--accent); text-transform:uppercase; letter-spacing:.6px; }
.herocard.rest .herolbl{ color:var(--muted); }
.heroname{ font-size:24px; font-weight:800; letter-spacing:-.5px; margin-top:4px; line-height:1.15; }
.herometa{ font-size:12px; color:var(--muted); margin-top:3px; }
.heroprev{ font-size:13px; color:var(--muted); margin-top:11px; line-height:1.45; }
.herobtn{ width:100%; margin-top:16px; background:var(--accent); color:#3a0f17; border:none; border-radius:12px; padding:14px; font-size:16px; font-weight:800; cursor:pointer; font-family:inherit; }
.acttarget{ flex:1; font-size:13px; color:var(--text); }
.acttarget.dim{ color:var(--muted); opacity:.7; }
.setrow.pend{ opacity:.65; }
.swlink{ display:block; margin:-4px auto 16px; }
.runover{ position:fixed; inset:0; background:radial-gradient(120% 80% at 50% 0%, #1a1320 0%, var(--bg) 55%); z-index:300; display:none; flex-direction:column; }
.runover.open{ display:flex; }
.runtop2{ display:flex; align-items:center; justify-content:space-between; padding:18px 18px 4px; }
.runtop2 .rx{ background:rgba(255,255,255,0.06); border:none; color:var(--muted); width:36px; height:36px; border-radius:50%; font-size:16px; cursor:pointer; font-family:inherit; }
.runtop2 .rc{ font-size:13px; font-weight:800; color:var(--muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:60%; }
.runtop2 .rfin{ background:none; border:none; color:var(--accent); font-weight:800; font-size:13px; cursor:pointer; font-family:inherit; }
.runstage{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:6px 24px 0; text-align:center; overflow-y:auto; }
.rkick{ font-size:12px; font-weight:800; letter-spacing:1.4px; text-transform:uppercase; color:var(--muted); }
.rname{ font-size:26px; font-weight:800; letter-spacing:-.6px; margin-top:6px; line-height:1.1; }
.rbwt{ display:inline-block; margin-top:8px; font-size:11px; font-weight:700; color:var(--accent); background:rgba(251,113,133,0.14); border-radius:99px; padding:4px 11px; }
.rdots{ display:flex; gap:8px; justify-content:center; margin:16px 0 0; }
.rdot{ width:12px; height:12px; border-radius:50%; border:2px solid var(--border); }
.rdot.done{ background:var(--green,#34d399); border-color:var(--green,#34d399); }
.rdot.cur{ border-color:var(--accent); box-shadow:0 0 0 4px rgba(251,113,133,0.16); }
.disc2{ width:240px; height:240px; border-radius:50%; position:relative; display:flex; align-items:center; justify-content:center; margin:22px 0; }
.disc2 svg{ position:absolute; inset:0; transform:rotate(-90deg); }
.disc2 .face{ display:flex; flex-direction:column; align-items:center; }
.disc2 .big{ font-size:56px; font-weight:900; letter-spacing:-2px; line-height:1; font-variant-numeric:tabular-nums; }
.disc2 .small{ font-size:13px; color:var(--muted); margin-top:6px; font-weight:600; }
.pulse2{ width:240px; height:240px; border-radius:50%; border:3px solid var(--accent); display:flex; align-items:center; justify-content:center; flex-direction:column; animation:pulse2 1.6s ease-in-out infinite; margin:22px 0; }
@keyframes pulse2{ 0%,100%{ box-shadow:0 0 0 0 rgba(251,113,133,0); } 50%{ box-shadow:0 0 0 16px rgba(251,113,133,0.08); } }
.rgo{ font-size:30px; font-weight:900; }
.rsteps{ display:flex; gap:14px; }
.sbox{ background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:20px; padding:14px 16px; min-width:120px; }
.sbox .lbl{ font-size:11px; font-weight:800; letter-spacing:.5px; text-transform:uppercase; color:var(--muted); }
.sctl{ display:flex; align-items:center; justify-content:space-between; gap:8px; margin-top:8px; }
.sctl button{ width:40px; height:40px; border-radius:50%; border:none; background:var(--surface2); color:var(--text); font-size:24px; font-weight:700; cursor:pointer; font-family:inherit; }
.sctl .v{ font-size:26px; font-weight:900; min-width:44px; font-variant-numeric:tabular-nums; }
.runbtm{ padding:14px 24px calc(22px + env(safe-area-inset-bottom)); }
.rcta{ width:100%; border:none; border-radius:99px; padding:20px; font-size:18px; font-weight:900; letter-spacing:.2px; cursor:pointer; font-family:inherit; transition:transform .08s; }
.rcta:active{ transform:scale(.97); }
.rcta.start{ background:var(--accent); color:#3a0f17; }
.rcta.finish{ background:var(--green,#34d399); color:#05281c; }
.rcta.save{ background:#fff; color:#1f2430; }
.rcta.ghost{ background:var(--surface2); color:var(--text); }
.rsub{ width:100%; background:none; border:none; color:var(--muted); font-size:13px; font-weight:700; margin-top:12px; cursor:pointer; font-family:inherit; }
.rhint{ margin-top:14px; max-width:300px; }
</style>
</head>
<body>
<div id="loading"></div>

<div id="app">
  <div class="header">
    <div class="hl"><img src="/icon-192.png" alt="Joelboard"><h1>Fit</h1></div>
    <div class="acct"><span id="acctEmail"></span><button class="lnk" onclick="openSettings()" title="Ajustes">⚙</button><button class="lnk" onclick="fitSignOut()">Sair</button></div>
  </div>
  <div class="tabbar">
    <button class="tabb on" data-tab="hoje" onclick="tab('hoje')">Hoje</button>
    <button class="tabb" data-tab="treinos" onclick="tab('treinos')">Treinos</button>
    <button class="tabb" data-tab="exercicios" onclick="tab('exercicios')">Exercícios</button>
    <button class="tabb" data-tab="progresso" onclick="tab('progresso')">Progresso</button>
  </div>

  <div class="page on" id="p-hoje"><div id="hoje"></div></div>
  <div class="page" id="p-treinos"><div class="secbar"><div class="sect">Seus treinos</div><button class="btn" onclick="openTreino()">+ Adicionar</button></div><div id="treinoList"></div></div>
  <div class="page" id="p-exercicios">
    <div class="secbar"><div class="sect">Biblioteca de exercícios</div><button class="btn" onclick="openExercise()">+ Adicionar</button></div>
    <div id="exList"></div>
  </div>
  <div class="page" id="p-progresso"><div id="prog"></div></div>

  <div class="foot">© 2026 Joel Soluções LTDA</div>
</div>

<button class="door" onclick="location.href='/'" title="Voltar ao Joelboard" aria-label="Voltar ao Joelboard">
  <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M13 4h3a2 2 0 0 1 2 2v14"/><path d="M2 20h3"/><path d="M13 20h9"/><path d="M10 12v.01"/><path d="M13 4.562v16.157a1 1 0 0 1-1.242.97L5 20V5.562a2 2 0 0 1 1.515-1.94l4-1A2 2 0 0 1 13 4.561Z"/></svg>
</button>
<button class="fab" id="fab" onclick="fabAdd()" style="display:none;">+</button>

<div class="overlay" id="exOverlay" onclick="if(event.target===this)closeEx()">
  <div class="modal">
    <div class="mh"><div class="mt" id="exTitle">Novo exercício</div><button class="x" onclick="closeEx()">✕</button></div>
    <div class="fg"><label class="fl">Nome</label><input class="fi" id="exName" placeholder="ex.: Supino reto"></div>

<script src="https://accounts.google.com/gsi/client" async></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
<script src="/joelboard.js"></script>
<script>
var DATA=null, fitGrid={}, editingEx=null, authDone=false;
var FIT_TABS=[['Exercicios',['Nome','Grupo','ID']],['Treinos',['Nome','Itens','ID']],['Sessoes',['Data','Treino','Notas','ID']],['Series',['Sessao ID','Exercicio ID','Serie','Reps','Peso','ID']],['Config',['Chave','Valor']]];
var DEFAULT_TAGS=['Peito','Costas','Pernas','Glúteos','Ombros','Bíceps','Tríceps','Core','Panturrilha','Cardio','Outro'];
var STARTER=[['Supino reto','Peito'],['Supino inclinado','Peito'],['Crucifixo','Peito'],['Crossover','Peito'],['Flexão','Peito'],['Puxada alta','Costas'],['Remada curvada','Costas'],['Remada baixa','Costas'],['Barra fixa','Costas'],['Levantamento terra','Costas'],['Agachamento','Pernas'],['Leg press','Pernas'],['Cadeira extensora','Pernas'],['Mesa flexora','Pernas'],['Afundo','Pernas'],['Hip thrust','Glúteos'],['Desenvolvimento','Ombros'],['Elevação lateral','Ombros'],['Elevação frontal','Ombros'],['Encolhimento','Ombros'],['Rosca direta','Bíceps'],['Rosca alternada','Bíceps'],['Rosca martelo','Bíceps'],['Tríceps na polia','Tríceps'],['Tríceps testa','Tríceps'],['Mergulho','Tríceps'],['Prancha','Core'],['Abdominal','Core'],['Panturrilha em pé','Panturrilha'],['Esteira','Cardio'],['Bicicleta','Cardio'],['Barra australiana','Costas'],['Chin-up (supinado)','Bíceps'],['Muscle-up','Costas'],['Flexão diamante','Tríceps'],['Flexão declinada','Peito'],['Pistol squat','Pernas'],['Agachamento búlgaro','Pernas'],['Ponte de glúteo','Glúteos'],['Elevação de pernas suspensa','Core'],['L-sit','Core'],['Prancha lateral','Core'],['Superman','Costas'],['Burpee','Cardio'],['Mountain climber','Core'],['Polichinelo','Cardio'],['Step-up (subida no banco)','Pernas'],['Dips de banco','Tríceps']];
function $(id){ return document.getElementById(id); }
function uuid(){ return 'xxxxxxxxxxxx4xxxyxxxxxxxxxxxx'.replace(/[xy]/g,function(c){var r=Math.random()*16|0;return (c==='x'?r:(r&0x3|0x8)).toString(16);}); }
function loadingHtml(h){ $('loading').style.display='block'; $('loading').innerHTML=h; }
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(m){ var t=$('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(function(){t.classList.remove('show');},2200); }

/* ---- auth (shared core) ---- */
function startAuth(){
  if (JB.cachedToken()){ afterAuth(); return; }
  loadingHtml('<div class="gate"><div class="gt">💪 Joelboard Fit</div><div class="gs">Entrando…</div></div>');
  JB.requestToken(false).then(function(){ authDone=true; afterAuth(); }).catch(showSignIn);
  setTimeout(function(){ if(!authDone && !JB.cachedToken()) showSignIn(); }, 3000);
}
function showSignIn(){ loadingHtml('<div class="gate"><div class="gt">💪 Joelboard Fit</div><div class="gs">Treinos e progressão de carga.</div><button class="btn" onclick="doSignIn()">Entrar com Google</button></div>'); }
function doSignIn(){ JB.requestToken(true).then(function(){ authDone=true; afterAuth(); }).catch(function(){}); }
function fitSignOut(){ JB.signOut(); location.reload(); }
function afterAuth(){
  loadingHtml('<div class="gate"><div class="gs" style="margin-top:60px">Carregando…</div></div>');
  JB.fetchEmail().then(bootSheet);
}

/* ---- sheet bootstrap ---- */
function bootSheet(){
  loadingHtml('<div class="gate"><div class="gs" style="margin-top:60px">Procurando seu treino…</div></div>');
  JB.resolveSheet({ app:'fit', namePart:'Joelboard', requiredTabs: FIT_TABS.map(function(t){return t[0];}) })
    .then(function(ctx){ fitGrid=ctx.grid; loadData(); })
    .catch(function(e){ var m=String((e&&e.message)||''); if(m.indexOf('silent_timeout')>-1||m.indexOf('auth_failed')>-1||m.indexOf('401')>-1||m.indexOf('cancelled')>-1){ showSignIn(); return; } if(m==='JB_NEED_SHEET'){ var f=(e.files||[]); if(f.length>1) offerLink(f[0]); else gate(); return; } loadingHtml('<div class="gate"><div class="gs" style="color:var(--accent)">Erro: '+esc(m)+'</div></div>'); });
}
function gate(){
  loadingHtml('<div class="gate"><div class="gt">💪 Vamos treinar</div><div class="gs">Crie sua planilha de treino — ela fica no seu Google Drive.</div>'
    + '<button class="save" onclick="createSheet()">✨ Criar meu treino</button>'
    + '<div style="color:var(--muted);font-size:12px;margin:16px 0 10px">— ou já tem uma? —</div>'
    + '<input class="fi" id="fitUrl" placeholder="Cole o link da planilha"><button class="btn ghost" style="width:100%;margin-top:10px" onclick="linkSheet()">Conectar planilha</button>'
    + '<div id="fitErr" style="color:var(--accent);font-size:12px;margin-top:10px"></div></div>');
}
function offerLink(f){ loadingHtml('<div class="gate"><div class="gt">Encontramos seu treino 🎉</div><div class="gs">'+esc(f.name)+'</div><button class="save" onclick="pick(\''+f.id+'\')">Vincular e abrir</button><button class="del" onclick="gate()">usar outro / criar novo</button></div>'); }
function pick(id){ JB.setSheetId('fit',id); bootSheet(); }
function linkSheet(){ var u=($('fitUrl').value||'').trim(); var m=u.match(/[a-zA-Z0-9_-]{30,}/); if(!m){ $('fitErr').textContent='Link inválido.'; return; } JB.setSheetId('fit',m[0]); bootSheet(); }
function createSheet(){
  loadingHtml('<div class="gate"><div class="gs" style="margin-top:60px">Criando seu treino…</div></div>');
  var title='💪 Joelboard Fit — '+(JB.email()?JB.email().split('@')[0]:'Pessoal');
  JB.api('POST','https://sheets.googleapis.com/v4/spreadsheets',{ properties:{title:title}, sheets:FIT_TABS.map(function(t){return {properties:{title:t[0]}};}) })
    .then(function(ss){ JB.setSheetId('fit',ss.spreadsheetId);
      var data=FIT_TABS.map(function(t){return {range:t[0]+'!A1',values:[t[1]]};});
      data.push({range:'Exercicios!A2',values:STARTER.map(function(e){return [e[0],e[1],uuid()];})});
      data.push({range:'Config!A2',values:[['unit','kg'],['tags',JSON.stringify(DEFAULT_TAGS)]]});
      return JB.api('POST','https://sheets.googleapis.com/v4/spreadsheets/'+ss.spreadsheetId+'/values:batchUpdate',{valueInputOption:'RAW',data:data});
    }).then(bootSheet).catch(function(e){ loadingHtml('<div class="gate"><div class="gs" style="color:var(--accent)">Erro ao criar: '+esc(e.message)+'</div></div>'); });
}

/* ---- load ---- */
function ssUrl(p){ return 'https://sheets.googleapis.com/v4/spreadsheets/'+JB.getSheetId('fit')+p; }
function loadData(){
  loadingHtml('<div class="gate"><div class="gs" style="margin-top:60px">Carregando…</div></div>');
  var want=FIT_TABS.map(function(t){return t[0];}).filter(function(t){return fitGrid[t]!=null;});
  var ranges=want.map(function(t){return 'ranges='+encodeURIComponent(t);}).join('&');
  JB.api('GET', ssUrl('/values:batchGet?'+ranges+'&valueRenderOption=UNFORMATTED_VALUE&dateTimeRenderOption=SERIAL_NUMBER')).then(function(res){
    var by={}; (res.valueRanges||[]).forEach(function(vr,i){ by[want[i]]=vr.values||[]; });
    DATA=buildFit(by); render();
  }).catch(function(e){ var m=String(e.message||''); if(m.indexOf('403')>-1||m.indexOf('404')>-1||m.indexOf('PERMISSION')>-1){ JB.clearSheetId('fit'); bootSheet(); return; } loadingHtml('<div class="gate"><div class="gs" style="color:var(--accent)">Erro: '+esc(e.message)+'</div></div>'); });
}
function body(rows){ return (rows||[]).slice(1); }
function buildFit(t){
  var config={ unit:'kg' };
  body(t.Config).forEach(function(r){ if(r[0]) config[r[0]]=r[1]; });
  config.tags=(function(){ try{ var v=JSON.parse(config.tags); return (v&&v.length)?v:DEFAULT_TAGS; }catch(e){ return DEFAULT_TAGS; } })();
  config.rest=Number(config.rest)||90; config.inc=Number(config.inc)||2.5;
  config.schedule=(function(){ try{ var v=JSON.parse(config.schedule); return (v&&typeof v==='object')?v:{}; }catch(e){ return {}; } })();
  config.volgoals=(function(){ try{ var v=JSON.parse(config.volgoals); return (v&&typeof v==='object')?v:{}; }catch(e){ return {}; } })();
  config.exmodes=(function(){ try{ var v=JSON.parse(config.exmodes); return (v&&typeof v==='object')?v:{}; }catch(e){ return {}; } })();
  return {
    exercicios: body(t.Exercicios).filter(function(r){return r[0];}).map(function(r){ return { id:r[2], name:r[0], group:r[1]||'' }; }),
    treinos: body(t.Treinos).filter(function(r){return r[0];}).map(function(r){ var it=[]; try{it=JSON.parse(r[1]||'[]');}catch(e){} return { id:r[2], name:r[0], items:normItems(it) }; }),
    sessoes: body(t.Sessoes).filter(function(r){return r[0];}).map(function(r){ return { id:r[3], date:String(r[0]), treino:r[1]||'', notas:r[2]||'' }; }),
    series: body(t.Series).filter(function(r){return r[0]&&r[1];}).map(function(r){ return { id:r[5], sessaoId:String(r[0]), exId:String(r[1]), serie:Number(r[2])||0, reps:Number(r[3])||0, peso:Number(r[4])||0 }; }),
    config: config
  };
}

/* ---- render ---- */
function render(){ $('loading').style.display='none'; $('app').style.display='block'; $('acctEmail').textContent='👤 '+(JB.email()||''); renderExercicios(); renderTreinos(); renderHoje(); renderProgresso(); }
function tab(name){
  ['hoje','treinos','exercicios','progresso'].forEach(function(n){ $('p-'+n).classList.toggle('on', n===name); });
  document.querySelectorAll('.tabb').forEach(function(b){ b.classList.toggle('on', b.getAttribute('data-tab')===name); });
  $('fab').style.display = (name==='exercicios'||name==='treinos') ? 'flex' : 'none';
  if(name==='hoje') renderHoje(); else if(name==='treinos') renderTreinos(); else if(name==='exercicios') renderExercicios(); else if(name==='progresso'){ progEx=null; renderProgresso(); }
}
function renderExercicios(){
  var el=$('exList'); var ex=(DATA.exercicios||[]);
  if(!ex.length){ el.innerHTML='<div class="empty">Nenhum exercício ainda. Toque em “+ Adicionar”.</div>'; return; }
  el.innerHTML = ex.slice().sort(function(a,b){return a.name.localeCompare(b.name);}).map(function(x){
    return '<div class="row" onclick="openExercise(\''+x.id+'\')"><div><div class="rn">'+esc(x.name)+(exMode(x.id)==='bw'?' <span class="modebadge">corporal</span>':(exMode(x.id)==='bwload'?' <span class="modebadge">carga+corp</span>':''))+'</div>'+(x.group?'<div class="rg">'+esc(x.group)+'</div>':'')+'</div><span style="color:var(--muted)">›</span></div>';
  }).join('');
}

/* ---- exercise CRUD (via shared JB.api) ---- */
function fitFindRow(tab,idCol,id){ return JB.api('GET', ssUrl('/values/'+encodeURIComponent(tab)+'?valueRenderOption=UNFORMATTED_VALUE')).then(function(res){ var v=res.values||[]; for(var i=1;i<v.length;i++){ if(String((v[i]||[])[idCol])===String(id)) return i+1; } return -1; }); }
function openExercise(id){
  editingEx = id || null;
  var ex = id ? (DATA.exercicios||[]).find(function(x){return x.id===id;}) : null;
  $('exTitle').textContent = ex ? 'Editar exercício' : 'Novo exercício';
  $('exName').value = ex ? ex.name : '';
  fillGroupSelect(ex ? ex.group : '');
  $('exMode').value = (id ? exMode(id) : 'load');
  $('exDel').style.display = ex ? 'block' : 'none';
  $('exOverlay').classList.add('open');
}
function closeEx(){ $('exOverlay').classList.remove('open'); }
function saveExercise(){
  var name=($('exName').value||'').trim(), group=($('exGroup').value||'').trim();
  if(!name){ $('exName').focus(); return; }
  if(editingEx){
    var x=(DATA.exercicios||[]).find(function(e){return e.id===editingEx;}); if(x){ x.name=name; x.group=group; } setExMode(editingEx, ($('exMode').value||'load'));
    var id=editingEx; renderExercicios(); closeEx(); toast('✓ Salvo');
    fitFindRow('Exercicios',2,id).then(function(row){ if(row<0) throw new Error('not found'); return JB.api('PUT', ssUrl('/values/'+encodeURIComponent('Exercicios!A'+row+':C'+row)+'?valueInputOption=RAW'), { values:[[name,group,id]] }); }).catch(function(){ toast('Erro ao salvar'); reload(); });
  } else {
    var nid=uuid(); DATA.exercicios.push({ id:nid, name:name, group:group }); setExMode(nid, ($('exMode').value||'load')); renderExercicios(); closeEx(); toast('✓ Adicionado');
    JB.api('POST', ssUrl('/values/'+encodeURIComponent('Exercicios')+':append?valueInputOption=RAW&insertDataOption=INSERT_ROWS'), { values:[[name,group,nid]] }).catch(function(){ toast('Erro ao adicionar'); reload(); });
  }
}
function deleteExercise(){
  if(!editingEx) return; var id=editingEx;
  DATA.exercicios=(DATA.exercicios||[]).filter(function(e){return e.id!==id;}); renderExercicios(); closeEx(); toast('✓ Excluído');
  fitFindRow('Exercicios',2,id).then(function(row){ if(row<0) return; return JB.api('POST', ssUrl(':batchUpdate'), { requests:[{ deleteDimension:{ range:{ sheetId:fitGrid['Exercicios'], dimension:'ROWS', startIndex:row-1, endIndex:row } } }] }); }).catch(function(){ toast('Erro ao excluir'); reload(); });
}
function reload(){ JB.api('GET', ssUrl('/values:batchGet?ranges=Exercicios&ranges=Config&valueRenderOption=UNFORMATTED_VALUE')).then(function(res){ var by={}; (res.valueRanges||[]).forEach(function(vr){ by[(vr.range||'').split('!')[0].replace(/'/g,'')]=vr.values||[]; }); if(by.Exercicios){ DATA.exercicios=body(by.Exercicios).filter(function(r){return r[0];}).map(function(r){return {id:r[2],name:r[0],group:r[1]||''};}); renderExercicios(); } }).catch(function(){}); }

var editingTreino=null, trSel=[], trSortable=null;
function exName(id){ var x=(DATA.exercicios||[]).find(function(e){return e.id===id;}); return x?x.name:'—'; }
function fabAdd(){ var on=document.querySelector('.page.on'); var t=on?on.id.replace('p-',''):''; if(t==='treinos') openTreino(); else openExercise(); }
function renderTreinos(){
  var el=$('treinoList'); if(!el) return; var tr=(DATA.treinos||[]);
  if(!tr.length){ el.innerHTML='<div class="empty">Nenhum treino ainda. Toque em “+ Adicionar” para montar um split.</div>'; return; }
  el.innerHTML=tr.map(function(r){ var items=(r.items||[]); var prev=items.slice(0,3).map(function(it){ return exName(it.ex)+' '+it.sets+'×'+it.rmin+(it.rmax&&it.rmax!==it.rmin?('-'+it.rmax):''); }).join(' · ')+(items.length>3?(' +'+(items.length-3)):''); return '<div class="row" onclick="openTreino(\''+r.id+'\')"><div><div class="rn">'+esc(r.name)+'</div><div class="rg">'+(items.length?esc(prev):'sem exercícios')+'</div></div><span style="color:var(--muted)">›</span></div>'; }).join('');
}
function openTreino(id){
  if(!(DATA.exercicios||[]).length){ toast('Adicione exercícios primeiro'); tab('exercicios'); return; }
  editingTreino=id||null;
  var r= id?(DATA.treinos||[]).find(function(x){return x.id===id;}):null;
  $('trTitle').textContent= r?'Editar treino':'Novo treino';
  $('trName').value= r?r.name:'';
  trSel= r?(r.items||[]).map(function(it){return {ex:it.ex,sets:it.sets,rmin:it.rmin,rmax:it.rmax,rest:it.rest};}):[];
  $('trDel').style.display= r?'block':'none';
  $('trSearch').value=''; renderTrEditor(); $('trOverlay').classList.add('open');
}
function renderTrEditor(){ renderTrSelList(); initTrSort(); renderTrAdd(); }
function renderTrSelList(){

  if(!rows.length){ fitConfirm('Nada registrado','Sair sem salvar este treino?', function(){ stopRest(); sess=null; $('runOverlay').classList.remove('open'); renderHoje(); }); return; }
  var date=sess.date, tname=sess.treinoName;
  DATA.sessoes.push({ id:sid, date:date, treino:tname, notas:'' });
  rows.forEach(function(r){ DATA.series.push({ id:r[5], sessaoId:sid, exId:r[1], serie:r[2], reps:r[3], peso:r[4] }); });
  stopRest(); sess=null; $('runOverlay').classList.remove('open'); renderHoje(); toast('✓ Treino salvo!');
  JB.api('POST', ssUrl('/values/Sessoes:append?valueInputOption=RAW&insertDataOption=INSERT_ROWS'), { values:[[date,tname,'',sid]] })
    .then(function(){ return JB.api('POST', ssUrl('/values/Series:append?valueInputOption=RAW&insertDataOption=INSERT_ROWS'), { values:rows }); })
    .catch(function(){ toast('Erro ao salvar — recarregue'); });
}
var progEx=null;
function exHasData(id){ return (DATA.series||[]).some(function(x){return x.exId===id;}); }
function progData(exId){
  var dateOf={}; (DATA.sessoes||[]).forEach(function(s){dateOf[s.id]=s.date;});
  var bySes={}; (DATA.series||[]).filter(function(x){return x.exId===exId;}).forEach(function(x){ (bySes[x.sessaoId]=bySes[x.sessaoId]||[]).push(x); });
  return Object.keys(bySes).map(function(sid){ var sets=bySes[sid]; var top=0,e1=0; sets.forEach(function(st){ if(st.peso>top)top=st.peso; var e=st.peso*(1+st.reps/30); if(e>e1)e1=e; }); return { date:dateOf[sid]||'', top:top, e1rm:Math.round(e1), sets:sets.slice().sort(function(a,b){return a.serie-b.serie;}) }; }).filter(function(d){return d.date;}).sort(function(a,b){return (a.date||'').localeCompare(b.date||'');});
}
function progChart(d){
  var pts=d.slice(-12); if(pts.length<2) return '';
  var W=320,H=120,pad=12; var ws=pts.map(function(p){return p.top;}); var mx=Math.max.apply(null,ws), mn=Math.min.apply(null,ws); if(mx===mn)mx=mn+1;
  var step=(W-2*pad)/(pts.length-1);
  var co=pts.map(function(p,i){ return [pad+i*step, H-pad-((p.top-mn)/(mx-mn))*(H-2*pad)]; });
  var line=co.map(function(c,i){return (i?'L':'M')+c[0].toFixed(1)+' '+c[1].toFixed(1);}).join(' ');
  var dots=co.map(function(c){return '<circle cx="'+c[0].toFixed(1)+'" cy="'+c[1].toFixed(1)+'" r="3" fill="#fb7185"/>';}).join('');
  return '<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:6px"><div class="rg" style="margin-bottom:8px">Carga máx. por sessão ('+unit()+')</div><svg viewBox="0 0 '+W+' '+H+'" width="100%" preserveAspectRatio="none" style="height:118px;display:block"><path d="'+line+'" fill="none" stroke="#fb7185" stroke-width="2" stroke-linejoin="round"/>'+dots+'</svg></div>';
}
function progHdr(name){ return '<div class="secbar"><div style="display:flex;align-items:center;gap:8px"><button class="lnk" onclick="backProg()">‹ Voltar</button><div class="rn">'+esc(name)+'</div></div></div>'; }
function openProg(id){ progEx=id; renderProgresso(); window.scrollTo(0,0); }
function backProg(){ progEx=null; renderProgresso(); }
function exTarget(exId){ var found=null,pname=''; (DATA.treinos||[]).forEach(function(r){ (r.items||[]).forEach(function(it){ if(it.ex===exId && !found){ found=it; pname=r.name; } }); }); if(found) return { sets:Number(found.sets)||3, rmin:Number(found.rmin)||8, rmax:Number(found.rmax)||12, rest:(found.rest!=null?found.rest:restDefault()), prog:pname }; return { sets:3, rmin:8, rmax:12, rest:restDefault(), prog:'' }; }
function modeLabel(m){ return m==='bw'?'Peso corporal':(m==='bwload'?'Carga + corporal':'Carga'); }
function progNextMsg(sg,t){ var u=unit(); switch(sg.kind){
  case 'up': return 'Você bateu o topo! Próxima sessão: <b>subir p/ '+sg.to+u+'</b>.';
  case 'hold': return 'Agora: <b>'+sg.from+u+'</b> — busque <b>'+t.rmax+' reps</b> em todas as séries. Ao completar → <b>'+(Math.round((sg.from+incDefault())*100)/100)+u+'</b>.';
  case 'stall': return 'Travado há 3 sessões em '+sg.from+u+'. Sugestão: <b>deload p/ '+sg.to+u+'</b> ou variação mais difícil.';
  case 'bw-reps': return 'Agora: subir reps até <b>'+t.rmax+'</b> em todas as séries. Ao completar → <b>+1 série</b>.';
  case 'bw-set': return 'Você dominou! Próxima sessão: <b>adicione a '+sg.sets+'ª série</b>.';
  case 'bw-rest': return 'Você dominou! Próxima sessão: <b>reduza o descanso p/ '+sg.rest+'s</b>.';
  case 'bw-harder': return 'Você dominou! Próximo: <b>'+esc(sg.harder||'uma variação mais difícil')+'</b>.';
  default: return 'Registre uma sessão para ver a sugestão.';
} }
function progPreviewHtml(exId){
  var t=exTarget(exId), mode=exMode(exId), sg=suggestProg(exId,t), u=unit();
  var h=progData(exId), m=h.length?sessMetrics(h[h.length-1]):null;
  var pct=m?Math.min(100,Math.round((m.repsMin/Math.max(t.rmax,1))*100)):0;
  var barCls=(m&&m.repsMin>=t.rmax)?'in':'under';
  var bar=m?('<div class="voltrack" style="margin-top:10px"><div class="volbar '+barCls+'" style="width:'+pct+'%"></div></div><div class="ppvstat">Última: '+m.repsMin+'/'+t.rmax+' reps'+(mode!=='bw'?(' @ '+m.W+u):'')+(m.nSets?(' · '+m.nSets+' séries'):'')+'</div>'):'<div class="ppvstat">Sem sessões ainda.</div>';
  var ladder='';
  if(mode==='bw'){ var stages=['+Reps','+Série','−Descanso','Variação']; var cur=sg.kind==='bw-set'?1:sg.kind==='bw-rest'?2:sg.kind==='bw-harder'?3:0; ladder='<div class="ppvlad">'+stages.map(function(st,i){ return '<div class="ppvstep'+(i===cur?' on':'')+(i<cur?' done':'')+'">'+st+'</div>'; }).join('')+'</div>'; }
  return '<div class="ppv"><div class="ppvh"><span class="ppvt">Próxima progressão</span><span class="modebadge">'+modeLabel(mode)+'</span></div>'
    +'<div class="ppvtarget">Alvo: '+t.sets+' × '+t.rmin+'–'+t.rmax+' reps · ⏱ '+t.rest+'s'+(t.prog?(' · '+esc(t.prog)):'')+'</div>'
    +bar+ladder
    +'<div class="ppvnextlbl">Próximo passo</div><div class="ppvnext">'+progNextMsg(sg,t)+'</div></div>';
}
function renderProgresso(){
  var el=$('prog'); if(!el) return;
  if(progEx){
    var name=exName(progEx); var d=progData(progEx);
    if(!d.length){ el.innerHTML=progHdr(name)+'<div class="empty">Sem registros ainda.</div>'; return; }
    var mode=exMode(progEx);
    var prTop=0,prE=0,prReps=0; d.forEach(function(x){ if(x.top>prTop)prTop=x.top; if(x.e1rm>prE)prE=x.e1rm; x.sets.forEach(function(s){ if((Number(s.reps)||0)>prReps) prReps=Number(s.reps)||0; }); });
    var cards = (mode==='bw') ? ('<div class="prg"><div class="prc"><div class="prl">Melhor série</div><div class="prv">'+prReps+' reps</div></div><div class="prc"><div class="prl">Sessões</div><div class="prv">'+d.length+'</div></div></div>') : ('<div class="prg"><div class="prc"><div class="prl">Melhor carga</div><div class="prv">'+prTop+' '+unit()+'</div></div><div class="prc"><div class="prl">1RM estim.</div><div class="prv">'+prE+' '+unit()+'</div></div><div class="prc"><div class="prl">Sessões</div><div class="prv">'+d.length+'</div></div></div>');
    var hist=d.slice().reverse().map(function(x){ return '<div class="row" style="cursor:default"><div><div class="rn">'+x.date+'</div><div class="rg">'+x.sets.map(function(s){return mode==='bw'?(''+s.reps):(s.reps+'×'+s.peso);}).join(' · ')+'</div></div><div style="font-weight:800;color:var(--accent)">'+(mode==='bw'?(Math.max.apply(null,x.sets.map(function(s){return Number(s.reps)||0;}))+' reps'):(x.top+' '+unit()))+'</div></div>'; }).join('');
    el.innerHTML=progHdr(name)+cards+progPreviewHtml(progEx)+(mode==='bw'?'':progChart(d))+'<div class="sect" style="margin:22px 0 10px">Histórico</div>'+hist;
    return;
  }
  var volSec='<div class="secbar"><div class="sect">Volume da semana</div><span class="rg" style="font-size:11px">séries / grupo</span></div><div class="volwrap">'+volPanelHtml()+'</div>';
  var exs=(DATA.exercicios||[]).filter(function(x){return exHasData(x.id);}).sort(function(a,b){return a.name.localeCompare(b.name);});
  var exSec='<div class="secbar" style="margin-top:24px"><div class="sect">Progresso por exercício</div></div>'+(exs.length?exs.map(function(x){ return '<div class="row" onclick="openProg(\''+x.id+'\')"><div class="rn">'+esc(x.name)+'</div><span style="color:var(--muted)">›</span></div>'; }).join(''):'<div class="empty" style="padding:18px">Registre treinos para ver seu progresso por exercício.</div>');
  el.innerHTML=volSec+exSec;
}
function fillGroupSelect(val){ var sel=$('exGroup'); var tags=(DATA.config&&DATA.config.tags)||DEFAULT_TAGS; var opts='<option value="">— sem grupo —</option>'; if(val && tags.indexOf(val)<0) opts+='<option value="'+esc(val)+'">'+esc(val)+'</option>'; opts+=tags.map(function(t){return '<option value="'+esc(t)+'">'+esc(t)+'</option>';}).join(''); sel.innerHTML=opts; sel.value=val||''; }
function openSettings(){ renderSettings(); switchSet('geral'); $('setOverlay').classList.add('open'); }
function closeSettings(){ $('setOverlay').classList.remove('open'); }
function renderSettings(){
  var u=unit();
  $('setUnit').innerHTML=['kg','lb'].map(function(x){ return '<button class="btn '+(x===u?'':'ghost')+'" style="margin-right:8px" onclick="setUnitS(\''+x+'\')">'+x+'</button>'; }).join('');
  var tags=(DATA.config&&DATA.config.tags)||DEFAULT_TAGS;
  $('setTags').innerHTML=tags.map(function(t,i){ return '<span class="tagchip">'+esc(t)+'<span class="tx" onclick="removeTag('+i+')">✕</span></span>'; }).join('')||'<div class="rg">Nenhum grupo.</div>';
  if($('setRest')) $('setRest').value=restDefault(); if($('setInc')) $('setInc').value=incDefault();
  renderSched(); renderVolGoals();
}
function switchSet(name){ document.querySelectorAll('#setOverlay .set-tab').forEach(function(b){ b.classList.toggle('active', b.getAttribute('data-st')===name); }); document.querySelectorAll('#setOverlay .set-pane').forEach(function(p){ p.style.display=(p.getAttribute('data-pane')===name)?'':'none'; }); }
function loadDefaults(){ var have={}; (DATA.exercicios||[]).forEach(function(e){ have[(e.name||'').toLowerCase()]=1; }); var add=STARTER.filter(function(e){ return !have[e[0].toLowerCase()]; }); if(!add.length){ toast('Biblioteca já está completa ✓'); return; } var rows=add.map(function(e){ var id=uuid(); DATA.exercicios.push({id:id,name:e[0],group:e[1]}); return [e[0],e[1],id]; }); renderExercicios(); renderSettings(); toast('+'+add.length+' exercícios adicionados'); JB.api('POST', ssUrl('/values/'+encodeURIComponent('Exercicios')+':append?valueInputOption=RAW&insertDataOption=INSERT_ROWS'), {values:rows}).catch(function(){ toast('Erro ao salvar — recarregue'); }); }
function setUnitS(u){ DATA.config=DATA.config||{}; DATA.config.unit=u; saveConfig('unit',u); renderSettings(); renderHoje(); }
function persistTags(){ saveConfig('tags', JSON.stringify(DATA.config.tags||[])); }
function addTag(){ var v=($('newTag').value||'').trim(); if(!v) return; DATA.config=DATA.config||{}; if(!DATA.config.tags) DATA.config.tags=DEFAULT_TAGS.slice(); if(DATA.config.tags.indexOf(v)<0) DATA.config.tags.push(v); $('newTag').value=''; persistTags(); renderSettings(); }
function removeTag(i){ if(!DATA.config||!DATA.config.tags) return; DATA.config.tags.splice(i,1); persistTags(); renderSettings(); }
function deleteSession(id){
  fitConfirm('Excluir treino?','Remove este treino e suas séries do histórico.', function(){ doDeleteSession(id); });
}
function doDeleteSession(id){
  DATA.sessoes=(DATA.sessoes||[]).filter(function(s){return s.id!==id;});
  DATA.series=(DATA.series||[]).filter(function(x){return x.sessaoId!==id;});
  renderHoje(); if(progEx) renderProgresso(); toast('✓ Treino excluído');
  fitFindRow('Sessoes',3,id).then(function(row){ if(row<0) return; return JB.api('POST', ssUrl(':batchUpdate'), { requests:[{ deleteDimension:{ range:{ sheetId:fitGrid['Sessoes'], dimension:'ROWS', startIndex:row-1, endIndex:row } } }] }); })
    .then(function(){ return JB.api('GET', ssUrl('/values/Series?valueRenderOption=UNFORMATTED_VALUE')); })
    .then(function(res){ var v=res.values||[]; var reqs=[]; for(var i=v.length-1;i>=1;i--){ if(String((v[i]||[])[0])===String(id)) reqs.push({ deleteDimension:{ range:{ sheetId:fitGrid['Series'], dimension:'ROWS', startIndex:i, endIndex:i+1 } } }); } if(!reqs.length) return; return JB.api('POST', ssUrl(':batchUpdate'), { requests:reqs }); })
    .catch(function(){ toast('Erro ao excluir — recarregue'); });
}
function normItems(arr){ return (arr||[]).map(function(it){ if(typeof it==='string') return {ex:it,sets:3,rmin:8,rmax:12,rest:null}; return {ex:it.ex,sets:Number(it.sets)||3,rmin:Number(it.rmin)||8,rmax:Number(it.rmax)||12,rest:(it.rest!=null&&it.rest!==''?Number(it.rest):null)}; }); }
function restDefault(){ return Number(DATA.config&&DATA.config.rest)||90; }
function incDefault(){ return Number(DATA.config&&DATA.config.inc)||2.5; }
/* ---- weekly volume (sets per muscle group, Sunday–Saturday) ---- */
function ymd(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function weekBounds(){ var d=new Date(); d.setHours(12,0,0,0); var st=new Date(d); st.setDate(d.getDate()-d.getDay()); var en=new Date(st); en.setDate(st.getDate()+6); return [ymd(st),ymd(en)]; }
function weeklyVolume(){ var b=weekBounds(); var dateOf={}; (DATA.sessoes||[]).forEach(function(s){ dateOf[s.id]=s.date; }); var grpOf={}; (DATA.exercicios||[]).forEach(function(e){ grpOf[e.id]=e.group||'Outro'; }); var vol={}; (DATA.series||[]).forEach(function(x){ var d=dateOf[x.sessaoId]; if(!d||d<b[0]||d>b[1]) return; var g=grpOf[x.exId]||'Outro'; vol[g]=(vol[g]||0)+1; }); return vol; }
function volGoals(){ return (DATA.config&&DATA.config.volgoals)||{}; }
function volGoal(g){ var v=volGoals()[g]; if(v&&v.length===2&&(Number(v[0])||Number(v[1]))) return [Number(v[0])||0,Number(v[1])||0]; return [10,20]; }
function volStatus(n,g){ var mm=volGoal(g); if(n<mm[0]) return 'under'; if(n>mm[1]) return 'over'; return 'in'; }
function volPanelHtml(){ var vol=weeklyVolume(); var tags=((DATA.config&&DATA.config.tags)||DEFAULT_TAGS).slice(); Object.keys(vol).forEach(function(g){ if(tags.indexOf(g)<0) tags.push(g); }); var rows=tags.filter(function(g){ return (vol[g]||0)>0; }).sort(function(a,b){ return (vol[b]||0)-(vol[a]||0); }); if(!rows.length) return '<div class="rg" style="padding:2px 0">Nenhuma série registrada nesta semana ainda.</div>'; return rows.map(function(g){ var n=vol[g]||0; var mm=volGoal(g); var st=volStatus(n,g); var pct=Math.min(100,Math.round(n/Math.max(mm[1],1)*100)); return '<div class="volrow"><div class="volhd"><span class="volg">'+esc(g)+'</span><span class="voln '+st+'">'+n+' <span class="volt">/ '+mm[0]+'–'+mm[1]+'</span></span></div><div class="voltrack"><div class="volbar '+st+'" style="width:'+pct+'%"></div></div></div>'; }).join(''); }
function volNudgeHtml(){ var vol=weeklyVolume(); var groups=Object.keys(vol).filter(function(g){return vol[g]>0;}); if(!groups.length) return ''; var hit=groups.filter(function(g){ return vol[g]>=volGoal(g)[0]; }).length; var under=groups.filter(function(g){ return vol[g]<volGoal(g)[0]; }).sort(function(a,b){return vol[a]-vol[b];}); var sub=under.length ? ('Faltam séries: '+under.slice(0,3).map(function(g){ return esc(g)+' '+vol[g]+'/'+volGoal(g)[0]; }).join(' · ')) : 'Todos os grupos no mínimo da meta 💪'; return '<div class="volnudge" onclick="tab(\'progresso\')"><div class="vnh"><span>Volume da semana</span><span class="vnc">'+hit+'/'+groups.length+' no alvo ›</span></div><div class="vns">'+sub+'</div></div>'; }
function renderVolGoals(){ if(!$('setVol')) return; var tags=(DATA.config&&DATA.config.tags)||DEFAULT_TAGS; $('setVol').innerHTML='<div class="rg" style="font-size:11px;margin-bottom:8px">Padrão 10–20 séries/semana. Ajuste por grupo se quiser.</div>'+tags.map(function(g,i){ var mm=volGoal(g); return '<div class="volgrow"><span class="volgname">'+esc(g)+'</span><input class="fi vmini" type="number" inputmode="numeric" value="'+mm[0]+'" onchange="setVolGoal('+i+',0,this.value)"><span class="vdash">–</span><input class="fi vmini" type="number" inputmode="numeric" value="'+mm[1]+'" onchange="setVolGoal('+i+',1,this.value)"></div>'; }).join(''); }
function setVolGoal(i,which,val){ var tags=(DATA.config&&DATA.config.tags)||DEFAULT_TAGS; var g=tags[i]; if(g==null) return; DATA.config=DATA.config||{}; var vg=DATA.config.volgoals||{}; var cur=vg[g]||[10,20]; cur=[Number(cur[0])||10,Number(cur[1])||20]; var n=Number(val); if(!(n>=0)) n=(which?20:10); cur[which]=n; if(cur[1]<cur[0]) cur[1]=cur[0]; vg[g]=cur; DATA.config.volgoals=vg; saveConfig('volgoals', JSON.stringify(vg)); }
function saveDefault(k,v){ DATA.config=DATA.config||{}; var n=Number(v); if(!n||n<0) n=(k==='rest'?90:2.5); DATA.config[k]=n; saveConfig(k,String(n)); }
function setTarget(ex,f,v){ var it=(trSel||[]).find(function(i){return i.ex===ex;}); if(!it) return; if(f==='rest'){ it.rest=(v===''?null:Number(v)); } else { it[f]=Number(v)||0; } }
var WD=['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
function wdName(i){ return WD[i]||''; }
function schedFor(wd){ var s=(DATA.config&&DATA.config.schedule)||{}; return s[wd]||s[String(wd)]||''; }
function setSchedule(wd,rid){ DATA.config=DATA.config||{}; DATA.config.schedule=DATA.config.schedule||{}; if(rid) DATA.config.schedule[wd]=rid; else delete DATA.config.schedule[wd]; saveConfig('schedule', JSON.stringify(DATA.config.schedule)); renderHoje(); }
function renderSched(){ if(!$('setSched')) return; var sc=(DATA.config&&DATA.config.schedule)||{}; var sh=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb']; $('setSched').innerHTML=sh.map(function(d,i){ var cur=sc[i]||sc[String(i)]||''; var opts='<option value="">Descanso</option>'+(DATA.treinos||[]).map(function(r){ return '<option value="'+r.id+'"'+(cur===r.id?' selected':'')+'>'+esc(r.name)+'</option>'; }).join(''); return '<div style="display:flex;align-items:center;gap:10px;margin-bottom:6px"><span style="width:32px;color:var(--muted);font-size:13px;font-weight:700">'+d+'</span><select class="fi" style="flex:1" onchange="setSchedule('+i+',this.value)">'+opts+'</select></div>'; }).join(''); }
var askCb=null;
function fitConfirm(title,msg,onYes){ askCb=onYes||null; $('askTitle').textContent=title||'Confirmar'; $('askMsg').textContent=msg||''; $('askOverlay').classList.add('open'); }
function closeAsk(){ $('askOverlay').classList.remove('open'); askCb=null; }
function confirmYes(){ var cb=askCb; closeAsk(); if(cb) cb(); }
startAuth();
</script>

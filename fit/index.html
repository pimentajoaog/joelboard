<body>
<div id="loading"></div>

<div id="app">
  <div class="header">
    <div class="hl"><img src="/icon-192.png" alt="Joelboard"><h1>Fit</h1></div>
    <div class="acct"><span id="acctEmail"></span><button class="lnk" onclick="openSettings()" title="Ajustes">вҡҷ</button><button class="lnk" onclick="fitSignOut()">Sair</button></div>
  </div>
  <div class="tabbar">
    <button class="tabb on" data-tab="hoje" onclick="tab('hoje')">Hoje</button>
    <button class="tabb" data-tab="treinos" onclick="tab('treinos')">Treinos</button>
    <button class="tabb" data-tab="exercicios" onclick="tab('exercicios')">ExercГӯcios</button>
    <button class="tabb" data-tab="progresso" onclick="tab('progresso')">Progresso</button>
  </div>

  <div class="page on" id="p-hoje"><div id="hoje"></div></div>
  <div class="page" id="p-treinos"><div class="secbar"><div class="sect">Seus treinos</div><button class="btn" onclick="openTreino()">+ Adicionar</button></div><div id="treinoList"></div></div>
  <div class="page" id="p-exercicios">
    <div class="secbar"><div class="sect">Biblioteca de exercГӯcios</div><button class="btn" onclick="openExercise()">+ Adicionar</button></div>
    <div id="exList"></div>
  </div>
  <div class="page" id="p-progresso"><div id="prog"></div></div>

  <div class="foot">В© 2026 Joel SoluГ§Гөes LTDA</div>
</div>

<button class="door" onclick="location.href='/'" title="Voltar ao Joelboard" aria-label="Voltar ao Joelboard">
  <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M13 4h3a2 2 0 0 1 2 2v14"/><path d="M2 20h3"/><path d="M13 20h9"/><path d="M10 12v.01"/><path d="M13 4.562v16.157a1 1 0 0 1-1.242.97L5 20V5.562a2 2 0 0 1 1.515-1.94l4-1A2 2 0 0 1 13 4.561Z"/></svg>
</button>
<button class="fab" id="fab" onclick="fabAdd()" style="display:none;">+</button>

<div class="overlay" id="exOverlay" onclick="if(event.target===this)closeEx()">
  <div class="modal">
    <div class="mh"><div class="mt" id="exTitle">Novo exercГӯcio</div><button class="x" onclick="closeEx()">вң•</button></div>
    <div class="fg"><label class="fl">Nome</label><input class="fi" id="exName" placeholder="ex.: Supino reto"></div>
    <div class="fg"><label class="fl">Grupo muscular</label><select class="fi" id="exGroup"></select></div>
    <div class="fg"><label class="fl">Tipo de progressГЈo</label><select class="fi" id="exMode"><option value="load">Carga (peso)</option><option value="bw">Peso corporal</option><option value="bwload">Carga + corporal</option></select></div>
    <button class="save" id="exSave" onclick="saveExercise()">Salvar</button>
    <button class="del" id="exDel" onclick="deleteExercise()" style="display:none;">Excluir exercГӯcio</button>
  </div>
</div>

<div class="overlay" id="trOverlay" onclick="if(event.target===this)closeTr()">
  <div class="modal">
    <div class="mh"><div class="mt" id="trTitle">Novo treino</div><button class="x" onclick="closeTr()">вң•</button></div>
    <div class="fg"><label class="fl">Nome do treino</label><input class="fi" id="trName" placeholder="ex.: Push, PernasвҖҰ"></div>
    <div class="fg"><label class="fl">ExercГӯcios do treino (arraste вҳ° para reordenar)</label><div id="trSelList"></div></div>
    <div class="fg"><label class="fl">Adicionar exercГӯcio</label><input class="fi" id="trSearch" placeholder="Buscar ou criarвҖҰ" oninput="renderTrAdd()"><div id="trAddList" style="max-height:220px;overflow-y:auto;margin-top:8px;border:1px solid var(--border);border-radius:12px;padding:6px;background:var(--surface2)"></div></div>
    <button class="save" id="trSave" onclick="saveTreino()">Salvar</button>
    <button class="del" id="trDel" onclick="deleteTreino()" style="display:none;">Excluir treino</button>
  </div>
</div>
<div class="overlay" id="sessPickOverlay" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="modal"><div class="mh"><div class="mt">Adicionar exercГӯcio</div><button class="x" onclick="document.getElementById('sessPickOverlay').classList.remove('open')">вң•</button></div><div id="sessPickList" style="max-height:340px;overflow-y:auto"></div></div>
</div>
<div class="runover" id="runOverlay">
  <div class="runtop2" id="runTop"></div>
  <div class="runstage" id="runStage"></div>
  <div class="runbtm" id="runBtm"></div>
</div>
<div class="overlay" id="switchOverlay" onclick="if(event.target===this)closeSwitch()">
  <div class="modal"><div class="mh"><div class="mt">Escolher treino</div><button class="x" onclick="closeSwitch()">вң•</button></div><div id="switchList" style="max-height:380px;overflow-y:auto"></div></div>
</div>
<div class="overlay" id="setOverlay" onclick="if(event.target===this)closeSettings()">
  <div class="modal">
    <div class="mh"><div class="mt">Ajustes</div><button class="x" onclick="closeSettings()">вң•</button></div>
    <div class="set-tabs">
      <button class="set-tab active" data-st="geral" onclick="switchSet('geral')">Geral</button>
      <button class="set-tab" data-st="programa" onclick="switchSet('programa')">Programa</button>
      <button class="set-tab" data-st="volume" onclick="switchSet('volume')">Volume</button>
      <button class="set-tab" data-st="sobre" onclick="switchSet('sobre')">Sobre</button>
    </div>
    <div class="set-pane" data-pane="geral">
      <div class="fg"><label class="fl">Unidade de peso</label><div id="setUnit"></div></div>
      <div class="fg"><label class="fl">Descanso padrГЈo (segundos)</label><input class="fi" id="setRest" type="number" inputmode="numeric" onchange="saveDefault('rest',this.value)"></div>
      <div class="fg"><label class="fl">Incremento de carga (kg)</label><input class="fi" id="setInc" type="number" inputmode="decimal" step="0.5" onchange="saveDefault('inc',this.value)"></div>
      <div class="fg"><label class="fl">Biblioteca de exercГӯcios</label><button class="btn ghost" style="width:100%" onclick="loadDefaults()">вҶ» Carregar exercГӯcios padrГЈo (inclui calistenia)</button></div>
    </div>
    <div class="set-pane" data-pane="programa" style="display:none">
      <div class="fg"><label class="fl">Programa semanal</label><div id="setSched"></div></div>
    </div>
    <div class="set-pane" data-pane="volume" style="display:none">
      <div class="fg"><label class="fl">Grupos musculares</label><div id="setTags"></div><div style="display:flex;gap:8px;margin-top:10px"><input class="fi" id="newTag" placeholder="Novo grupoвҖҰ"><button class="btn" onclick="addTag()">Adicionar</button></div></div>
      <div class="fg"><label class="fl">Metas de volume (sГ©ries/semana)</label><div id="setVol"></div></div>
    </div>
    <div class="set-pane" data-pane="sobre" style="display:none">
      <div class="fg"><button class="btn ghost" style="width:100%" onclick="JB.feedback('Joelboard Fit')">рҹ’¬ Enviar feedback</button></div>
      <div class="fg"><button class="del" style="width:100%" onclick="fitSignOut()">Sair</button></div>
      <div class="rg" style="text-align:center;font-size:11px;margin-top:4px">Joelboard Fit</div>
    </div>
    <button class="save" onclick="closeSettings()">Pronto</button>
  </div>
</div>
<div class="overlay" id="askOverlay" onclick="if(event.target===this)closeAsk()">
  <div class="modal" style="max-width:360px">
    <div class="mt" id="askTitle" style="margin-bottom:8px"></div>
    <div class="rg" id="askMsg" style="margin-bottom:18px;line-height:1.5;font-size:13px"></div>
    <div style="display:flex;gap:10px">
      <button class="btn ghost" style="flex:1" onclick="closeAsk()">Cancelar</button>
      <button class="btn" style="flex:1" onclick="confirmYes()">Confirmar</button>
    </div>
  </div>
</div>
<div id="restBar" class="restbar" style="display:none"></div>
<div class="toast" id="toast"></div>

<script src="https://accounts.google.com/gsi/client" async></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
<script src="/joelboard.js"></script>
<script>
var DATA=null, fitGrid={}, editingEx=null, authDone=false;
var FIT_TABS=[['Exercicios',['Nome','Grupo','ID']],['Treinos',['Nome','Itens','ID']],['Sessoes',['Data','Treino','Notas','ID']],['Series',['Sessao ID','Exercicio ID','Serie','Reps','Peso','ID']],['Config',['Chave','Valor']]];
var DEFAULT_TAGS=['Peito','Costas','Pernas','GlГәteos','Ombros','BГӯceps','TrГӯceps','Core','Panturrilha','Cardio','Outro'];
var STARTER=[['Supino reto','Peito'],['Supino inclinado','Peito'],['Crucifixo','Peito'],['Crossover','Peito'],['FlexГЈo','Peito'],['Puxada alta','Costas'],['Remada curvada','Costas'],['Remada baixa','Costas'],['Barra fixa','Costas'],['Levantamento terra','Costas'],['Agachamento','Pernas'],['Leg press','Pernas'],['Cadeira extensora','Pernas'],['Mesa flexora','Pernas'],['Afundo','Pernas'],['Hip thrust','GlГәteos'],['Desenvolvimento','Ombros'],['ElevaГ§ГЈo lateral','Ombros'],['ElevaГ§ГЈo frontal','Ombros'],['Encolhimento','Ombros'],['Rosca direta','BГӯceps'],['Rosca alternada','BГӯceps'],['Rosca martelo','BГӯceps'],['TrГӯceps na polia','TrГӯceps'],['TrГӯceps testa','TrГӯceps'],['Mergulho','TrГӯceps'],['Prancha','Core'],['Abdominal','Core'],['Panturrilha em pГ©','Panturrilha'],['Esteira','Cardio'],['Bicicleta','Cardio'],['Barra australiana','Costas'],['Chin-up (supinado)','BГӯceps'],['Muscle-up','Costas'],['FlexГЈo diamante','TrГӯceps'],['FlexГЈo declinada','Peito'],['Pistol squat','Pernas'],['Agachamento bГәlgaro','Pernas'],['Ponte de glГәteo','GlГәteos'],['ElevaГ§ГЈo de pernas suspensa','Core'],['L-sit','Core'],['Prancha lateral','Core'],['Superman','Costas'],['Burpee','Cardio'],['Mountain climber','Core'],['Polichinelo','Cardio'],['Step-up (subida no banco)','Pernas'],['Dips de banco','TrГӯceps']];
function $(id){ return document.getElementById(id); }
function uuid(){ return 'xxxxxxxxxxxx4xxxyxxxxxxxxxxxx'.replace(/[xy]/g,function(c){var r=Math.random()*16|0;return (c==='x'?r:(r&0x3|0x8)).toString(16);}); }
function loadingHtml(h){ $('loading').style.display='block'; $('loading').innerHTML=h; }
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(m){ var t=$('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(function(){t.classList.remove('show');},2200); }

/* ---- auth (shared core) ---- */
function startAuth(){
  if (JB.cachedToken()){ afterAuth(); return; }
  loadingHtml('<div class="gate"><div class="gt">рҹ’Ә Joelboard Fit</div><div class="gs">EntrandoвҖҰ</div></div>');
  JB.requestToken(false).then(function(){ authDone=true; afterAuth(); }).catch(showSignIn);
  setTimeout(function(){ if(!authDone && !JB.cachedToken()) showSignIn(); }, 3000);
}
function showSignIn(){ loadingHtml('<div class="gate"><div class="gt">рҹ’Ә Joelboard Fit</div><div class="gs">Treinos e progressГЈo de carga.</div><button class="btn" onclick="doSignIn()">Entrar com Google</button></div>'); }
function doSignIn(){ JB.requestToken(true).then(function(){ authDone=true; afterAuth(); }).catch(function(){}); }
function fitSignOut(){ JB.signOut(); location.reload(); }
function afterAuth(){
  loadingHtml('<div class="gate"><div class="gs" style="margin-top:60px">CarregandoвҖҰ</div></div>');
  JB.fetchEmail().then(bootSheet);
}

/* ---- sheet bootstrap ---- */
function bootSheet(){
  loadingHtml('<div class="gate"><div class="gs" style="margin-top:60px">Procurando seu treinoвҖҰ</div></div>');
  JB.resolveSheet({ app:'fit', namePart:'Joelboard', requiredTabs: FIT_TABS.map(function(t){return t[0];}) })
    .then(function(ctx){ fitGrid=ctx.grid; loadData(); })
    .catch(function(e){ var m=String((e&&e.message)||''); if(m.indexOf('silent_timeout')>-1||m.indexOf('auth_failed')>-1||m.indexOf('401')>-1||m.indexOf('cancelled')>-1){ showSignIn(); return; } if(m==='JB_NEED_SHEET'){ var f=(e.files||[]); if(f.length>1) offerLink(f[0]); else gate(); return; } loadingHtml('<div class="gate"><div class="gs" style="color:var(--accent)">Erro: '+esc(m)+'</div></div>'); });
}
function gate(){
  loadingHtml('<div class="gate"><div class="gt">рҹ’Ә Vamos treinar</div><div class="gs">Crie sua planilha de treino вҖ” ela fica no seu Google Drive.</div>'
    + '<button class="save" onclick="createSheet()">вңЁ Criar meu treino</button>'
    + '<div style="color:var(--muted);font-size:12px;margin:16px 0 10px">вҖ” ou jГЎ tem uma? вҖ”</div>'
    + '<input class="fi" id="fitUrl" placeholder="Cole o link da planilha"><button class="btn ghost" style="width:100%;margin-top:10px" onclick="linkSheet()">Conectar planilha</button>'
    + '<div id="fitErr" style="color:var(--accent);font-size:12px;margin-top:10px"></div></div>');
}
function offerLink(f){ loadingHtml('<div class="gate"><div class="gt">Encontramos seu treino рҹҺү</div><div class="gs">'+esc(f.name)+'</div><button class="save" onclick="pick(\''+f.id+'\')">Vincular e abrir</button><button class="del" onclick="gate()">usar outro / criar novo</button></div>'); }
function pick(id){ JB.setSheetId('fit',id); bootSheet(); }
function linkSheet(){ var u=($('fitUrl').value||'').trim(); var m=u.match(/[a-zA-Z0-9_-]{30,}/); if(!m){ $('fitErr').textContent='Link invГЎlido.'; return; } JB.setSheetId('fit',m[0]); bootSheet(); }
function createSheet(){
  loadingHtml('<div class="gate"><div class="gs" style="margin-top:60px">Criando seu treinoвҖҰ</div></div>');
  var title='рҹ’Ә Joelboard Fit вҖ” '+(JB.email()?JB.email().split('@')[0]:'Pessoal');
  JB.api('POST','https://sheets.googleapis.com/v4/spreadsheets',{ properties:{title:title}, sheets:FIT_TABS.map(function(t){return {properties:{title:t[0]}};}) })
    .then(function(ss){ JB.setSheetId('fit',ss.spreadsheetId);
      var data=FIT_TABS.map(function(t){return {range:t[0]+'!A1',values:[t[1]]};});
      data.push({range:'Exercicios!A2',values:STARTER.map(function(e){return [e[0],e[1],uuid()];})});
      data.push({range:'Config!A2',values:[['unit','kg'],['tags',JSON.stringify(DEFAULT_TAGS)]]});
      return JB.api('POST','https://sheets.googleapis.com/v4/spreadsheets/'+ss.spreadsheetId+'/values:batchUpdate',{valueInputOption:'RAW',data:data});
    }).then(bootSheet).catch(function(e){ loadingHtml('<div class="gate"><div class="gs" style="color:var(--accent)">Erro ao criar: '+esc(e.message)+'</div></div>'); });
}

/* ---- load ---- */
function ssUrl(p){ return 'https://sheets.googleapis.com/v4/spreadsheets/'+JB.getSheetId('fit')+p; }
function loadData(){
  loadingHtml('<div class="gate"><div class="gs" style="margin-top:60px">CarregandoвҖҰ</div></div>');
  var want=FIT_TABS.map(function(t){return t[0];}).filter(function(t){return fitGrid[t]!=null;});
  var ranges=want.map(function(t){return 'ranges='+encodeURIComponent(t);}).join('&');
  JB.api('GET', ssUrl('/values:batchGet?'+ranges+'&valueRenderOption=UNFORMATTED_VALUE&dateTimeRenderOption=SERIAL_NUMBER')).then(function(res){
    var by={}; (res.valueRanges||[]).forEach(function(vr,i){ by[want[i]]=vr.values||[]; });
    DATA=buildFit(by); render();
  }).catch(function(e){ var m=String(e.message||''); if(m.indexOf('403')>-1||m.indexOf('404')>-1||m.indexOf('PERMISSION')>-1){ JB.clearSheetId('fit'); bootSheet(); return; } loadingHtml('<div class="gate"><div class="gs" style="color:var(--accent)">Erro: '+esc(e.message)+'</div></div>'); });
}
function body(rows){ return (rows||[]).slice(1); }
function buildFit(t){
  var config={ unit:'kg' };
  body(t.Config).forEach(function(r){ if(r[0]) config[r[0]]=r[1]; });
  config.tags=(function(){ try{ var v=JSON.parse(config.tags); return (v&&v.length)?v:DEFAULT_TAGS; }catch(e){ return DEFAULT_TAGS; } })();
  config.rest=Number(config.rest)||90; config.inc=Number(config.inc)||2.5;
  config.schedule=(function(){ try{ var v=JSON.parse(config.schedule); return (v&&typeof v==='object')?v:{}; }catch(e){ return {}; } })();
  config.volgoals=(function(){ try{ var v=JSON.parse(config.volgoals); return (v&&typeof v==='object')?v:{}; }catch(e){ return {}; } })();
  config.exmodes=(function(){ try{ var v=JSON.parse(config.exmodes); return (v&&typeof v==='object')?v:{}; }catch(e){ return {}; } })();
  return {
    exercicios: body(t.Exercicios).filter(function(r){return r[0];}).map(function(r){ return { id:r[2], name:r[0], group:r[1]||'' }; }),
    treinos: body(t.Treinos).filter(function(r){return r[0];}).map(function(r){ var it=[]; try{it=JSON.parse(r[1]||'[]');}catch(e){} return { id:r[2], name:r[0], items:normItems(it) }; }),
    sessoes: body(t.Sessoes).filter(function(r){return r[0];}).map(function(r){ return { id:r[3], date:String(r[0]), treino:r[1]||'', notas:r[2]||'' }; }),
    series: body(t.Series).filter(function(r){return r[0]&&r[1];}).map(function(r){ return { id:r[5], sessaoId:String(r[0]), exId:String(r[1]), serie:Number(r[2])||0, reps:Number(r[3])||0, peso:Number(r[4])||0 }; }),
    config: config
  };
}

/* ---- render ---- */
function render(){ $('loading').style.display='none'; $('app').style.display='block'; $('acctEmail').textContent='рҹ‘Ө '+(JB.email()||''); renderExercicios(); renderTreinos(); renderHoje(); renderProgresso(); }
function tab(name){
  ['hoje','treinos','exercicios','progresso'].forEach(function(n){ $('p-'+n).classList.toggle('on', n===name); });
  document.querySelectorAll('.tabb').forEach(function(b){ b.classList.toggle('on', b.getAttribute('data-tab')===name); });
  $('fab').style.display = (name==='exercicios'||name==='treinos') ? 'flex' : 'none';
  if(name==='hoje') renderHoje(); else if(name==='treinos') renderTreinos(); else if(name==='exercicios') renderExercicios(); else if(name==='progresso'){ progEx=null; renderProgresso(); }
}
function renderExercicios(){
  var el=$('exList'); var ex=(DATA.exercicios||[]);
  if(!ex.length){ el.innerHTML='<div class="empty">Nenhum exercГӯcio ainda. Toque em вҖң+ AdicionarвҖқ.</div>'; return; }
  el.innerHTML = ex.slice().sort(function(a,b){return a.name.localeCompare(b.name);}).map(function(x){
    return '<div class="row" onclick="openExercise(\''+x.id+'\')"><div><div class="rn">'+esc(x.name)+(exMode(x.id)==='bw'?' <span class="modebadge">corporal</span>':(exMode(x.id)==='bwload'?' <span class="modebadge">carga+corp</span>':''))+'</div>'+(x.group?'<div class="rg">'+esc(x.group)+'</div>':'')+'</div><span style="color:var(--muted)">вҖә</span></div>';
  }).join('');
}

/* ---- exercise CRUD (via shared JB.api) ---- */
function fitFindRow(tab,idCol,id){ return JB.api('GET', ssUrl('/values/'+encodeURIComponent(tab)+'?valueRenderOption=UNFORMATTED_VALUE')).then(function(res){ var v=res.values||[]; for(var i=1;i<v.length;i++){ if(String((v[i]||[])[idCol])===String(id)) return i+1; } return -1; }); }
function openExercise(id){
  editingEx = id || null;
  var ex = id ? (DATA.exercicios||[]).find(function(x){return x.id===id;}) : null;
  $('exTitle').textContent = ex ? 'Editar exercГӯcio' : 'Novo exercГӯcio';
  $('exName').value = ex ? ex.name : '';
  fillGroupSelect(ex ? ex.group : '');
  $('exMode').value = (id ? exMode(id) : 'load');
  $('exDel').style.display = ex ? 'block' : 'none';
  $('exOverlay').classList.add('open');
}
function closeEx(){ $('exOverlay').classList.remove('open'); }
function saveExercise(){
  var name=($('exName').value||'').trim(), group=($('exGroup').value||'').trim();
  if(!name){ $('exName').focus(); return; }
  if(editingEx){
    var x=(DATA.exercicios||[]).find(function(e){return e.id===editingEx;}); if(x){ x.name=name; x.group=group; } setExMode(editingEx, ($('exMode').value||'load'));
    var id=editingEx; renderExercicios(); closeEx(); toast('вң“ Salvo');
    fitFindRow('Exercicios',2,id).then(function(row){ if(row<0) throw new Error('not found'); return JB.api('PUT', ssUrl('/values/'+encodeURIComponent('Exercicios!A'+row+':C'+row)+'?valueInputOption=RAW'), { values:[[name,group,id]] }); }).catch(function(){ toast('Erro ao salvar'); reload(); });
  } else {
    var nid=uuid(); DATA.exercicios.push({ id:nid, name:name, group:group }); setExMode(nid, ($('exMode').value||'load')); renderExercicios(); closeEx(); toast('вң“ Adicionado');
    JB.api('POST', ssUrl('/values/'+encodeURIComponent('Exercicios')+':append?valueInputOption=RAW&insertDataOption=INSERT_ROWS'), { values:[[name,group,nid]] }).catch(function(){ toast('Erro ao adicionar'); reload(); });
  }
}
function deleteExercise(){
  if(!editingEx) return; var id=editingEx;
  DATA.exercicios=(DATA.exercicios||[]).filter(function(e){return e.id!==id;}); renderExercicios(); closeEx(); toast('вң“ ExcluГӯdo');

function volNudgeHtml(){ var vol=weeklyVolume(); var groups=Object.keys(vol).filter(function(g){return vol[g]>0;}); if(!groups.length) return ''; var hit=groups.filter(function(g){ return vol[g]>=volGoal(g)[0]; }).length; var under=groups.filter(function(g){ return vol[g]<volGoal(g)[0]; }).sort(function(a,b){return vol[a]-vol[b];}); var sub=under.length ? ('Faltam sГ©ries: '+under.slice(0,3).map(function(g){ return esc(g)+' '+vol[g]+'/'+volGoal(g)[0]; }).join(' В· ')) : 'Todos os grupos no mГӯnimo da meta рҹ’Ә'; return '<div class="volnudge" onclick="tab(\'progresso\')"><div class="vnh"><span>Volume da semana</span><span class="vnc">'+hit+'/'+groups.length+' no alvo вҖә</span></div><div class="vns">'+sub+'</div></div>'; }
function renderVolGoals(){ if(!$('setVol')) return; var tags=(DATA.config&&DATA.config.tags)||DEFAULT_TAGS; $('setVol').innerHTML='<div class="rg" style="font-size:11px;margin-bottom:8px">PadrГЈo 10вҖ“20 sГ©ries/semana. Ajuste por grupo se quiser.</div>'+tags.map(function(g,i){ var mm=volGoal(g); return '<div class="volgrow"><span class="volgname">'+esc(g)+'</span><input class="fi vmini" type="number" inputmode="numeric" value="'+mm[0]+'" onchange="setVolGoal('+i+',0,this.value)"><span class="vdash">вҖ“</span><input class="fi vmini" type="number" inputmode="numeric" value="'+mm[1]+'" onchange="setVolGoal('+i+',1,this.value)"></div>'; }).join(''); }
function setVolGoal(i,which,val){ var tags=(DATA.config&&DATA.config.tags)||DEFAULT_TAGS; var g=tags[i]; if(g==null) return; DATA.config=DATA.config||{}; var vg=DATA.config.volgoals||{}; var cur=vg[g]||[10,20]; cur=[Number(cur[0])||10,Number(cur[1])||20]; var n=Number(val); if(!(n>=0)) n=(which?20:10); cur[which]=n; if(cur[1]<cur[0]) cur[1]=cur[0]; vg[g]=cur; DATA.config.volgoals=vg; saveConfig('volgoals', JSON.stringify(vg)); }
function saveDefault(k,v){ DATA.config=DATA.config||{}; var n=Number(v); if(!n||n<0) n=(k==='rest'?90:2.5); DATA.config[k]=n; saveConfig(k,String(n)); }
function setTarget(ex,f,v){ var it=(trSel||[]).find(function(i){return i.ex===ex;}); if(!it) return; if(f==='rest'){ it.rest=(v===''?null:Number(v)); } else { it[f]=Number(v)||0; } }
var WD=['Domingo','Segunda','TerГ§a','Quarta','Quinta','Sexta','SГЎbado'];
function wdName(i){ return WD[i]||''; }
function schedFor(wd){ var s=(DATA.config&&DATA.config.schedule)||{}; return s[wd]||s[String(wd)]||''; }
function setSchedule(wd,rid){ DATA.config=DATA.config||{}; DATA.config.schedule=DATA.config.schedule||{}; if(rid) DATA.config.schedule[wd]=rid; else delete DATA.config.schedule[wd]; saveConfig('schedule', JSON.stringify(DATA.config.schedule)); renderHoje(); }
function renderSched(){ if(!$('setSched')) return; var sc=(DATA.config&&DATA.config.schedule)||{}; var sh=['Dom','Seg','Ter','Qua','Qui','Sex','SГЎb']; $('setSched').innerHTML=sh.map(function(d,i){ var cur=sc[i]||sc[String(i)]||''; var opts='<option value="">Descanso</option>'+(DATA.treinos||[]).map(function(r){ return '<option value="'+r.id+'"'+(cur===r.id?' selected':'')+'>'+esc(r.name)+'</option>'; }).join(''); return '<div style="display:flex;align-items:center;gap:10px;margin-bottom:6px"><span style="width:32px;color:var(--muted);font-size:13px;font-weight:700">'+d+'</span><select class="fi" style="flex:1" onchange="setSchedule('+i+',this.value)">'+opts+'</select></div>'; }).join(''); }
var askCb=null;
function fitConfirm(title,msg,onYes){ askCb=onYes||null; $('askTitle').textContent=title||'Confirmar'; $('askMsg').textContent=msg||''; $('askOverlay').classList.add('open'); }
function closeAsk(){ $('askOverlay').classList.remove('open'); askCb=null; }
function confirmYes(){ var cb=askCb; closeAsk(); if(cb) cb(); }
startAuth();

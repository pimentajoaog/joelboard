<!DOCTYPE html>
<!-- Joelboard — hub. © 2026 Joel Soluções LTDA. -->
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Joelboard</title>
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="manifest" href="/manifest.json">
<link rel="stylesheet" href="/joelboard.css">
<meta name="theme-color" content="#0d0f18">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Joelboard">
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./src/hub.css">
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="brand"><img src="/icon-192.png" alt="Joelboard"><span class="wm">Joelboard</span></div>
    <div class="acct"><span id="greet">Olá 👋</span><button class="authbtn" id="authbtn">Entrar</button><button class="gear" id="gearBtn" onclick="openHubSet()" aria-label="Ajustes" title="Ajustes">⚙</button></div>
  </div>
  <div class="sub">Seus apps, num lugar só.</div>

  <div class="grid">
    <a class="tile" href="/finance">
      <div class="ico" style="background:#2a2f52"><svg width="30" height="30" viewBox="0 0 64 64"><rect x="14" y="46" width="36" height="3" rx="1.5" fill="#818cf8" opacity="0.4"/><rect x="15" y="33" width="8" height="13" rx="3" fill="#818cf8" opacity="0.55"/><rect x="28" y="26" width="8" height="20" rx="3" fill="#818cf8" opacity="0.8"/><rect x="41" y="20" width="8" height="26" rx="3" fill="#818cf8"/><circle cx="45" cy="17" r="9" fill="#34d399"/><text x="45" y="20.6" text-anchor="middle" font-family="Hanken Grotesk,sans-serif" font-size="9" font-weight="800" fill="#fff">R$</text></svg></div>
      <div class="suite">Joelboard</div>
      <div class="name" style="color:var(--primary)">Finance</div>
      <div class="desc">Receitas, contas, metas e poupança.</div>
      <div class="open">Abrir →</div>
    </a>
    <a class="tile" href="/fit">
      <div class="ico" style="background:#3a2530"><svg width="30" height="30" viewBox="0 0 64 64"><rect x="16" y="29" width="6" height="6" rx="2" fill="#fb7185"/><rect x="42" y="29" width="6" height="6" rx="2" fill="#fb7185"/><rect x="13" y="26" width="5" height="12" rx="2" fill="#fb7185"/><rect x="46" y="26" width="5" height="12" rx="2" fill="#fb7185"/><rect x="22" y="30.5" width="20" height="3" rx="1.5" fill="#fb7185"/></svg></div>
      <div class="suite">Joelboard</div>
      <div class="name" style="color:var(--fit)">Fit</div>
      <div class="desc">Treinos e progressão de carga.</div>
      <div class="open" style="color:var(--fit)">Abrir →</div>
    </a>
  </div>

  <div class="foot">© 2026 Joel Soluções LTDA · Todos os direitos reservados.</div>
</div>

<div class="overlay" id="hubSet" onclick="if(event.target===this)closeHubSet()">
  <div class="modal">
    <div class="mh"><div class="mt">Ajustes</div><button class="x" onclick="closeHubSet()">✕</button></div>
    <div id="hubAcct" class="acctline"></div>
    <button class="mbtn" onclick="JB.feedback('Joelboard Hub')">💬 Enviar feedback</button>
    <button class="mbtn" id="hubAuthBtn" onclick="hubAuth()">Entrar com Google</button>
    <div class="vrs">Joelboard · © 2026 Joel Soluções LTDA</div>
  </div>
</div>
<script src="https://accounts.google.com/gsi/client" async></script>
<script src="/joelboard.js"></script>
<script>
var greetEl=document.getElementById("greet"), btnEl=document.getElementById("authbtn");
function setGreet(){ var em=JB.email(); var on=!!JB.cachedToken()&&!!em; greetEl.textContent= on?("Olá, "+em.split("@")[0]+" 👋"):"Olá 👋"; btnEl.textContent= on?"Sair":"Entrar"; btnEl.onclick= on?doOut:doIn; }
function doIn(){ JB.requestToken(true).then(function(t){ return JB.fetchEmail(t); }).then(setGreet).catch(function(){}); }
function doOut(){ JB.signOut(); setGreet(); }
function openHubSet(){ var em=JB.email(); var on=!!JB.cachedToken()&&!!em; document.getElementById("hubAcct").textContent = on?("Conectado: "+em):"Você não está conectado."; document.getElementById("hubAuthBtn").textContent = on?"Sair":"Entrar com Google"; document.getElementById("hubSet").classList.add("open"); }
function closeHubSet(){ document.getElementById("hubSet").classList.remove("open"); }
function hubAuth(){ var on=!!JB.cachedToken()&&!!JB.email(); closeHubSet(); if(on) doOut(); else doIn(); }
setGreet();
</script>
<script>if("serviceWorker" in navigator){window.addEventListener("load",function(){navigator.serviceWorker.register("/sw.js").catch(function(){});});}</script>
</body>
</html>

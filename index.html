<!DOCTYPE html>
<!-- Joelboard — hub. © 2026 Joel Soluções LTDA. -->
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Joelboard</title>
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0d0f18">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Joelboard">
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{ --bg:#0d0f18; --surface:#1b1f32; --surface2:#252a40; --border:#2b3147; --primary:#818cf8; --income:#34d399; --fit:#fb7185; --text:#e7eaf3; --muted:#7b85a0; --radius:18px; }
*{ box-sizing:border-box; margin:0; padding:0; }
body{ background:var(--bg); color:var(--text); font-family:'Hanken Grotesk',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; min-height:100vh; padding:44px 22px 70px; }
.wrap{ max-width:720px; margin:0 auto; }
.top{ display:flex; align-items:center; justify-content:space-between; gap:14px; flex-wrap:wrap; }
.brand{ display:flex; align-items:center; gap:12px; }
.brand img{ width:40px; height:40px; border-radius:11px; display:block; }
.wm{ font-size:25px; font-weight:800; letter-spacing:-.6px; }
.acct{ display:flex; align-items:center; gap:12px; font-size:13px; color:var(--muted); }
.authbtn{ background:var(--surface2); border:1px solid var(--border); color:var(--primary); font-weight:700; font-size:12px; border-radius:99px; padding:6px 13px; cursor:pointer; font-family:inherit; }
.authbtn:hover{ border-color:var(--primary); }
.sub{ font-size:14px; color:var(--muted); margin:8px 2px 28px; }
.grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:16px; }
.tile{ display:flex; flex-direction:column; align-items:flex-start; gap:3px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:22px; text-decoration:none; color:var(--text); transition:transform .15s ease, border-color .15s ease; }
a.tile:hover{ transform:translateY(-3px); border-color:var(--primary); }
.ico{ width:50px; height:50px; border-radius:14px; display:flex; align-items:center; justify-content:center; margin-bottom:12px; }
.suite{ font-size:11px; font-weight:700; letter-spacing:.5px; text-transform:uppercase; color:var(--muted); }
.name{ font-size:19px; font-weight:800; letter-spacing:-.4px; margin-top:-2px; }
.desc{ font-size:12.5px; color:var(--muted); line-height:1.45; margin-top:5px; }
.open{ margin-top:13px; font-size:12px; font-weight:700; color:var(--primary); }
.tile.ghost{ opacity:0.62; }
.soon{ margin-top:13px; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--muted); background:var(--surface2); border:1px solid var(--border); border-radius:99px; padding:4px 11px; }
.foot{ margin-top:40px; font-size:11px; color:var(--muted); opacity:0.6; text-align:center; }
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="brand"><img src="/icon-192.png" alt="Joelboard"><span class="wm">Joelboard</span></div>
    <div class="acct"><span id="greet">Olá 👋</span><button class="authbtn" id="authbtn" onclick="hubSignIn()">Entrar</button></div>
  </div>
  <div class="sub">Seus apps, num lugar só.</div>

  <div class="grid">
    <a class="tile" href="/finance">
      <div class="ico" style="background:#2a2f52"><svg width="30" height="30" viewBox="0 0 64 64"><rect x="14" y="46" width="36" height="3" rx="1.5" fill="#818cf8" opacity="0.4"/><rect x="15" y="33" width="8" height="13" rx="3" fill="#818cf8" opacity="0.55"/><rect x="28" y="26" width="8" height="20" rx="3" fill="#818cf8" opacity="0.8"/><rect x="41" y="20" width="8" height="26" rx="3" fill="#818cf8"/><circle cx="45" cy="17" r="9" fill="#34d399"/><text x="45" y="20.6" text-anchor="middle" font-family="Hanken Grotesk,sans-serif" font-size="9" font-weight="800" fill="#fff">R$</text></svg></div>
      <div class="suite">Joelboard</div>
      <div class="name" style="color:var(--primary)">Finance</div>
      <div class="desc">Receitas, contas, metas e poupança.</div>
      <div class="open">Abrir →</div>
    </a>
    <div class="tile ghost">
      <div class="ico" style="background:#3a2530"><svg width="30" height="30" viewBox="0 0 64 64"><rect x="16" y="29" width="6" height="6" rx="2" fill="#fb7185"/><rect x="42" y="29" width="6" height="6" rx="2" fill="#fb7185"/><rect x="13" y="26" width="5" height="12" rx="2" fill="#fb7185"/><rect x="46" y="26" width="5" height="12" rx="2" fill="#fb7185"/><rect x="22" y="30.5" width="20" height="3" rx="1.5" fill="#fb7185"/></svg></div>
      <div class="suite">Joelboard</div>
      <div class="name" style="color:var(--fit)">Fit</div>
      <div class="desc">Treinos e progressão de carga.</div>
      <div class="soon">em breve</div>
    </div>
  </div>

  <div class="foot">© 2026 Joel Soluções LTDA · Todos os direitos reservados.</div>
</div>

<script src="https://accounts.google.com/gsi/client" async></script>
<script>
var CLIENT_ID='49262188240-l70ka2666t315gb2gmsvu357f2h7769i.apps.googleusercontent.com';
var SCOPES='openid email profile https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/drive.file';
var tc=null;
function cachedTok(){ try{ var t=localStorage.getItem('jb_tok'), e=Number(localStorage.getItem('jb_tok_exp')||0); if(t && Date.now()<e) return t; }catch(_){} return ''; }
function setGreet(){ var em=localStorage.getItem('jb_email')||''; var on=!!cachedTok()&&!!em; document.getElementById('greet').textContent = on ? ('Olá, '+em.split('@')[0]+' 👋') : 'Olá 👋'; var b=document.getElementById('authbtn'); b.textContent = on ? 'Sair' : 'Entrar'; b.onclick = on ? hubSignOut : hubSignIn; }
function initGis(){ if(!(window.google&&google.accounts&&google.accounts.oauth2)){ setTimeout(initGis,150); return; } tc=google.accounts.oauth2.initTokenClient({ client_id:CLIENT_ID, scope:SCOPES, callback:function(r){ if(r&&r.access_token){ try{ localStorage.setItem('jb_tok',r.access_token); localStorage.setItem('jb_tok_exp',String(Date.now()+(Number(r.expires_in)||3600)*1000-120000)); }catch(_){}
  fetch('https://www.googleapis.com/oauth2/v3/userinfo',{headers:{Authorization:'Bearer '+r.access_token}}).then(function(x){return x.json();}).then(function(u){ try{localStorage.setItem('jb_email',u.email||'');}catch(_){} setGreet(); }).catch(setGreet); } } }); }
function hubSignIn(){ if(tc) tc.requestAccessToken(); }
function hubSignOut(){ try{ var t=localStorage.getItem('jb_tok'); if(t&&window.google&&google.accounts&&google.accounts.oauth2&&google.accounts.oauth2.revoke) google.accounts.oauth2.revoke(t,function(){}); }catch(_){} try{ localStorage.removeItem('jb_tok'); localStorage.removeItem('jb_tok_exp'); localStorage.removeItem('jb_email'); }catch(_){} setGreet(); }
setGreet(); initGis();
</script>
<script>if("serviceWorker" in navigator){window.addEventListener("load",function(){navigator.serviceWorker.register("/sw.js").catch(function(){});});}</script>
</body>
</html>

<!DOCTYPE html>

  Phase 1, step 1: prove Google Sign-In + an API token work end-to-end.

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Joelboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{ --bg:#0d0f18; --surface:#1b1f32; --surface2:#252a40; --border:#2b3147; --primary:#818cf8; --income:#34d399; --expense:#f87171; --text:#e2e8f0; --muted:#67708a; }
*{ box-sizing:border-box; margin:0; padding:0; }
body{ background:var(--bg); color:var(--text); font-family:'Hanken Grotesk',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
.card{ background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:40px 32px; width:100%; max-width:420px; text-align:center; box-shadow:0 10px 40px rgba(0,0,0,0.3); }
.mark{ width:56px; height:56px; margin:0 auto 16px; }
h1{ font-size:28px; font-weight:800; letter-spacing:-0.5px; margin-bottom:4px; }
.tag{ font-size:14px; color:var(--muted); margin-bottom:28px; }
.btn{ display:inline-flex; align-items:center; gap:10px; background:#fff; color:#1f2430; border:none; border-radius:12px; padding:12px 20px; font-size:15px; font-weight:700; font-family:inherit; cursor:pointer; transition:transform .1s ease, opacity .15s; }
.btn:hover{ transform:translateY(-1px); }
.btn:disabled{ opacity:0.5; cursor:default; transform:none; }
.gicon{ width:20px; height:20px; }
.status{ margin-top:24px; font-size:14px; line-height:1.5; min-height:22px; }
.status.ok{ color:var(--income); font-weight:700; }
.status.err{ color:var(--expense); font-weight:600; }
.status.wait{ color:var(--muted); }
.foot{ margin-top:28px; font-size:11px; color:var(--muted); opacity:0.6; }
</style>
</head>
<body>
<div class="card">
  <svg class="mark" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><rect width="64" height="64" rx="16" fill="#818cf8"/><rect x="14" y="46.5" width="36" height="2.6" rx="1.3" fill="#fff" opacity="0.35"/><rect x="15" y="33" width="8" height="13" rx="3" fill="#fff" opacity="0.5"/><rect x="28" y="26" width="8" height="20" rx="3" fill="#fff" opacity="0.78"/><rect x="41" y="20" width="8" height="26" rx="3" fill="#fff"/><circle cx="45" cy="17" r="9" fill="#34d399" stroke="#fff" stroke-width="2.5"/><text x="45" y="20.7" text-anchor="middle" font-family="Arial,sans-serif" font-size="9.5" font-weight="800" fill="#fff">R$</text></svg>
  <h1>Joelboard</h1>
  <div class="tag">Suas finanças pessoais</div>
  <button class="btn" id="signin" onclick="signIn()" disabled>
    <svg class="gicon" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9.1 3.6l6.8-6.8C35.9 2.4 30.3 0 24 0 14.6 0 6.5 5.4 2.5 13.3l7.9 6.1C12.3 13.2 17.7 9.5 24 9.5z"/><path fill="#4285F4" d="M46.1 24.5c0-1.6-.1-3.1-.4-4.5H24v9h12.4c-.5 2.9-2.1 5.3-4.6 7l7.1 5.5c4.2-3.9 6.6-9.6 6.6-16.5z"/><path fill="#FBBC05" d="M10.4 28.6c-.5-1.5-.8-3-.8-4.6s.3-3.1.8-4.6l-7.9-6.1C.9 16.5 0 20.1 0 24s.9 7.5 2.5 10.7l7.9-6.1z"/><path fill="#34A853" d="M24 48c6.3 0 11.6-2.1 15.5-5.6l-7.1-5.5c-2 1.3-4.5 2.1-8.4 2.1-6.3 0-11.7-3.7-13.6-9l-7.9 6.1C6.5 42.6 14.6 48 24 48z"/></svg>
    Entrar com Google
  </button>
  <div class="status wait" id="status">Carregando…</div>
  <div class="foot">© 2026 Joel Soluções LTDA · teste de login (Fase 1)</div>
</div>

<script src="https://accounts.google.com/gsi/client" async></script>
<script>
const CLIENT_ID = '49262188240-l70ka2666t315gb2gmsvu357f2h7769i.apps.googleusercontent.com';
const SCOPES = 'openid email profile https://www.googleapis.com/auth/spreadsheets';
let tokenClient = null, accessToken = '';

function setStatus(msg, cls){ const el = document.getElementById('status'); el.textContent = msg; el.className = 'status ' + (cls || ''); }

function initAuth(){
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: function(resp){
      if (resp.error){ setStatus('Erro no login: ' + resp.error, 'err'); return; }
      accessToken = resp.access_token;
      setStatus('Token recebido — verificando…', 'wait');
      fetch('https://www.googleapis.com/oauth2/v3/userinfo', { headers: { Authorization: 'Bearer ' + accessToken } })
        .then(function(r){ return r.json(); })
        .then(function(u){ setStatus('✓ Conectado como ' + (u.email || u.name || '?') + ' — tudo certo!', 'ok'); })
        .catch(function(e){ setStatus('Token OK, mas a verificação falhou: ' + e, 'err'); });
    }
  });
  document.getElementById('signin').disabled = false;
  setStatus('Pronto — toque em "Entrar com Google".', 'wait');
}
function signIn(){ if (tokenClient) tokenClient.requestAccessToken(); }

// GIS loads async; wait for it.
(function wait(){
  if (window.google && google.accounts && google.accounts.oauth2) initAuth();
  else setTimeout(wait, 120);
})();
</script>
</body>
</html>
